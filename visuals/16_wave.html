<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wave</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0a0f00 0%, #000 70%);
      z-index: 0;
    }

    #display {
      position: relative;
      z-index: 1;
      white-space: pre;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 2px;
      color: #39ff14;
      text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff1480;
      user-select: none;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 2;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 3;
    }

    #btn {
      all: unset;
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #39ff14;
      letter-spacing: 3px;
      cursor: pointer;
    }

    #tgkeys {
      position: fixed;
      top: 54px;
      left: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: #39ff14;
      display: flex;
      gap: 1ch;
    }
    #tkey { cursor: pointer; }
    #grain-cv {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    #zko {
      position: fixed;
      bottom: 20px;
      left: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: #39ff14;
      text-decoration: none;
      cursor: pointer;
    }

    #ops {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: #39ff14;
    }

    #speed {
      position: fixed;
      top: 40px;
      right: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: #39ff14;
      user-select: none;
    }
    #speed span { cursor: pointer; }

    #legend {
      position: fixed;
      bottom: 20px;
      right: 24px;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      display: grid;
      grid-template-columns: repeat(8, 1em);
      gap: 4px 6px;
      line-height: 1.4;
      text-align: center;
    }
    #ckey {
      position: fixed;
      bottom: 67px;
      right: 24px;
      width: 1em;
      z-index: 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      line-height: 1.4;
      color: #39ff14;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="scanline"></div>
  <div class="vignette"></div>
  <pre id="display"></pre>
  <button id="btn"></button>
  <div id="tgkeys"><div id="tkey">T</div></div>
  <canvas id="grain-cv"></canvas>
  <div id="ops"></div>
  <div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
  <div id="legend"></div>
  <div id="ckey">C</div>
  <a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>

  <script>
    const display = document.getElementById('display');
    const btn     = document.getElementById('btn');

    // ── random char helpers ───────────────────────────────────
    const POOL = '.,:;+*#@0123456789';
    const rc   = () => POOL[Math.floor(Math.random() * POOL.length)];
    const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));

    // ── top-right random label ────────────────────────────────
    const opsEl = document.getElementById('ops');
    opsEl.textContent = rc()+rc()+rc()+rc();

    // ── VGA 16-color legend ───────────────────────────────────
    const VGA = [
      '#000000','#0000AA','#00AA00','#00AAAA',
      '#AA0000','#AA00AA','#AA5500','#AAAAAA',
      '#555555','#5555FF','#55FF55','#55FFFF',
      '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
    ];
    const legendEl    = document.getElementById('legend');
    let baseColor   = '#39ff14';
    let colorIdx    = 10;
    let uiColorIdx  = 10;
    let segments = [];
    function setWaveColor(col) {
      baseColor = col;
      display.style.color      = col;
      display.style.textShadow = `0 0 8px ${col}, 0 0 20px ${col}80`;
      document.getElementById('tgkeys').style.color = col;
    }
    function getAnalogous(col) {
      const r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
      const rn=r/255, gn=g/255, bn=b/255;
      const max=Math.max(rn,gn,bn), min=Math.min(rn,gn,bn), d=max-min;
      let h=0, s=0, l=(max+min)/2;
      if (d) {
        s = l>0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
          case rn: h=((gn-bn)/d+(gn<bn?6:0))/6; break;
          case gn: h=((bn-rn)/d+2)/6; break;
          case bn: h=((rn-gn)/d+4)/6; break;
        }
      }
      h = (((h*360 + (Math.random()>0.5?1:-1)*(20+Math.random()*20)) % 360)+360) % 360 / 360;
      const q=l<0.5?l*(1+s):l+s-l*s, p=2*l-q;
      const hue2rgb = t => { t=((t%1)+1)%1; return t<1/6?p+(q-p)*6*t:t<1/2?q:t<2/3?p+(q-p)*(2/3-t)*6:p; };
      const [nr,ng,nb] = s ? [hue2rgb(h+1/3),hue2rgb(h),hue2rgb(h-1/3)] : [l,l,l];
      return `#${Math.round(nr*255).toString(16).padStart(2,'0')}${Math.round(ng*255).toString(16).padStart(2,'0')}${Math.round(nb*255).toString(16).padStart(2,'0')}`;
    }

    let cHeld = false;
    window.addEventListener('keydown', e => { if (e.key === 'c' || e.key === 'C') cHeld = true; });
    window.addEventListener('keyup',   e => { if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*'); if (e.key === 'c' || e.key === 'C') cHeld = false; });

    const legendSpans = VGA.map(col => {
      const s = document.createElement('span');
      s.style.color  = col;
      s.style.cursor = 'pointer';
      s.textContent  = rc();
      s.addEventListener('click', () => {
        if (cHeld) {
          btn.style.color                               = col;
          opsEl.style.color                             = col;
          zkoEl.style.color                             = col;
          document.getElementById('ckey').style.color   = col;
          document.getElementById('tgkeys').style.color = col;
          document.getElementById('speed').style.color  = col;
        } else {
          setWaveColor(col);
        }
      });
      legendEl.appendChild(s);
      return s;
    });

    // ── bottom-left zko.io link ───────────────────────────────
    const zkoEl = document.getElementById('zko');
    zkoEl.textContent = rc()+rc()+rc()+rc();

    let cycleMs = 140;
    function cycleFn() {
      btn.textContent = rb();
      opsEl.textContent = rc()+rc()+rc()+rc();
      zkoEl.textContent = rc()+rc()+rc()+rc();
      legendSpans.forEach(s => s.textContent = rc());
    }
    let cycleId = setInterval(cycleFn, cycleMs);
    function updateSpeedUI() {
      const sl = document.getElementById('slower');
      const fa = document.getElementById('faster');
      sl.style.opacity       = cycleMs >= 560 ? '0.4' : '1';
      sl.style.pointerEvents = cycleMs >= 560 ? 'none' : '';
      fa.style.opacity       = cycleMs <= 140 ? '0.4' : '1';
      fa.style.pointerEvents = cycleMs <= 140 ? 'none' : '';
    }
    updateSpeedUI();
    document.getElementById('slower').addEventListener('click', () => {
      cycleMs = Math.min(560, cycleMs + 140);
      clearInterval(cycleId);
      cycleId = setInterval(cycleFn, cycleMs);
      updateSpeedUI();
    });
    document.getElementById('faster').addEventListener('click', () => {
      cycleMs = Math.max(140, cycleMs - 140);
      clearInterval(cycleId);
      cycleId = setInterval(cycleFn, cycleMs);
      updateSpeedUI();
    });
    window.addEventListener('keydown', e => {
      if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
      if (e.key === 'ArrowLeft' && !cHeld) {
        cycleMs = Math.min(560, cycleMs + 140);
        clearInterval(cycleId);
        cycleId = setInterval(cycleFn, cycleMs);
        updateSpeedUI();
      } else if (e.key === 'ArrowRight' && !cHeld) {
        cycleMs = Math.max(140, cycleMs - 140);
        clearInterval(cycleId);
        cycleId = setInterval(cycleFn, cycleMs);
        updateSpeedUI();
      } else if (!cHeld && e.key === 'ArrowUp') {
        colorIdx = (colorIdx - 1 + VGA.length) % VGA.length;
        setWaveColor(VGA[colorIdx]);
      } else if (!cHeld && e.key === 'ArrowDown') {
        colorIdx = (colorIdx + 1) % VGA.length;
        setWaveColor(VGA[colorIdx]);
      } else if (cHeld && e.key === 'ArrowUp') {
        uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
        btn.style.color                               = VGA[uiColorIdx];
        opsEl.style.color                             = VGA[uiColorIdx];
        zkoEl.style.color                             = VGA[uiColorIdx];
        document.getElementById('ckey').style.color   = VGA[uiColorIdx];
        document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
        document.getElementById('speed').style.color  = VGA[uiColorIdx];
      } else if (cHeld && e.key === 'ArrowDown') {
        uiColorIdx = (uiColorIdx + 1) % VGA.length;
        btn.style.color                               = VGA[uiColorIdx];
        opsEl.style.color                             = VGA[uiColorIdx];
        zkoEl.style.color                             = VGA[uiColorIdx];
        document.getElementById('ckey').style.color   = VGA[uiColorIdx];
        document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
        document.getElementById('speed').style.color  = VGA[uiColorIdx];
      }
    });

    const W    = 87;   // columns
    const H    = 16;   // rows (shorter rectangle)
    const N    = 7;    // number of parallel wave rows
    const BAND = H / N; // row-space per wave (2 rows each)

    let analyser   = null;
    let timeDomain = null;
    let micActive  = false;
    let micStream  = null;
    let audioCtx   = null;
    let parentAudio = null;
    let amplitude  = 0;
    let targetAmp  = 0;

    // ── per-wave random parameters ────────────────────────────
    const waves = Array.from({ length: N }, () => ({
      freq  : 0.10 + Math.random() * 0.20,
      speed : 0.014 + Math.random() * 0.016,
      phase : Math.random() * Math.PI * 2,
    }));

    // ── char buffer — refreshes every ~140ms like the button ─
    const charBuf = Array.from({ length: N }, () =>
      Array.from({ length: W }, rc)
    );
    let lastCharUpdate = 0;

    function refreshChars(now) {
      if (now - lastCharUpdate < 140) return;
      lastCharUpdate = now;
      for (let w = 0; w < N; w++)
        for (let c = 0; c < W; c++)
          charBuf[w][c] = rc();
    }

    // ── render ───────────────────────────────────────────────
    function render(speedMult = 1, now = 0) {
      refreshChars(now);
      const grid = Array.from({ length: H }, () => new Array(W).fill(' '));

      for (let w = 0; w < N; w++) {
        const wv = waves[w];
        wv.phase += wv.speed * speedMult;
        const baseRow = (w + 0.5) * BAND;
        for (let c = 0; c < W; c++) {
          const y   = baseRow + amplitude * Math.sin(c * wv.freq - wv.phase);
          const row = Math.round(y);
          if (row >= 0 && row < H) grid[row][c] = charBuf[w][c];
        }
      }

      if (segments.length > 0) {
        const lines = grid.map((r, ri) => {
          const seg = segments.find(s => s.row === ri);
          if (!seg) return r.join('');
          const line = r.join('');
          return line.slice(0, seg.col) +
            `<span style="color:${seg.color}">${line.slice(seg.col, seg.col + 4)}</span>` +
            line.slice(seg.col + 4);
        });
        display.innerHTML = lines.join('\n');
      } else {
        display.textContent = grid.map(r => r.join('')).join('\n');
      }
    }

    // ── simulate loud sound ───────────────────────────────────
    function triggerSegment() {
      const wi  = Math.floor(Math.random() * N);
      const row = Math.round((wi + 0.5) * BAND + amplitude * Math.sin(Math.random() * Math.PI * 2));
      if (row >= 0 && row < H) {
        const col   = Math.floor(Math.random() * (W - 4));
        const color = getAnalogous(baseColor);
        const seg   = { row, col, color };
        segments.push(seg);
        setTimeout(() => { segments = segments.filter(s => s !== seg); }, 4000);
      }
    }
    window.addEventListener('keydown', e => { if (e.key === 't' || e.key === 'T') triggerSegment(); });
    document.getElementById('tkey').addEventListener('click', triggerSegment);
    document.body.addEventListener('click', triggerSegment);

    // ── Grain ────────────────────────────────────────────────
    let grainOn  = true;
    const grainEl = document.getElementById('grain-cv');
    const grainCx = grainEl.getContext('2d');
    let grainImg  = null;
    function drawGrainFrame() {
      if (!grainOn) return;
      const gW = Math.ceil(window.innerWidth  / 2);
      const gH = Math.ceil(window.innerHeight / 2);
      if (grainEl.width !== gW || grainEl.height !== gH) {
        grainEl.width  = gW;
        grainEl.height = gH;
        grainImg = grainCx.createImageData(gW, gH);
      }
      const data = grainImg.data;
      for (let i = 0; i < data.length; i += 4) {
        const v = Math.random() * 255 | 0;
        data[i] = data[i+1] = data[i+2] = v;
        data[i+3] = Math.random() * 30 | 0;
      }
      grainCx.putImageData(grainImg, 0, 0);
      requestAnimationFrame(drawGrainFrame);
    }
    function toggleGrain() {
      grainOn = !grainOn;
      if (grainOn) drawGrainFrame();
    }
    window.addEventListener('keydown', e => { if (e.key === 'g' || e.key === 'G') toggleGrain(); });
    drawGrainFrame();

    // ── idle ─────────────────────────────────────────────────
    function idleTick(now) {
      if (parentAudio) {
        const rms = parentAudio.rms;
        targetAmp  = BAND * 0.3 + rms * BAND * 8;
        amplitude += (targetAmp - amplitude) * 0.2;
        if (rms > 0.04) triggerSegment();
        render(1 + rms * 10, now);
      } else {
        targetAmp  = BAND * 0.38;
        amplitude += (targetAmp - amplitude) * 0.04;
        render(1, now);
      }
    }

    // ── mic ──────────────────────────────────────────────────
    function micTick(now) {
      analyser.getByteTimeDomainData(timeDomain);

      let sumSq = 0;
      for (let i = 0; i < timeDomain.length; i++) {
        const d = timeDomain[i] / 255 - 0.5;
        sumSq += d * d;
      }
      const rms = Math.sqrt(sumSq / timeDomain.length);

      targetAmp  = BAND * 0.3 + rms * BAND * 8;
      amplitude += (targetAmp - amplitude) * 0.2;
      if (rms > 0.04) triggerSegment();
      render(1 + rms * 10, now);
    }

    // ── loop ─────────────────────────────────────────────────
    function loop(now) {
      micActive ? micTick(now) : idleTick(now);
      requestAnimationFrame(loop);
    }

    // ── mic toggle ───────────────────────────────────────────
    btn.addEventListener('click', async () => {
      if (micActive) {
        micActive = false;
        btn.style.opacity = '0.4';
        micStream?.getTracks().forEach(t => t.stop());
        audioCtx?.close();
        micStream = audioCtx = analyser = timeDomain = null;
        return;
      }
      try {
        micStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
        const src  = audioCtx.createMediaStreamSource(micStream);
        analyser   = audioCtx.createAnalyser();
        analyser.fftSize               = 2048;
        analyser.smoothingTimeConstant = 0.5;
        src.connect(analyser);
        timeDomain = new Uint8Array(analyser.fftSize);
        micActive  = true;
        btn.style.opacity = '';
      } catch { /* permission denied — button keeps cycling */ }
    });

    // Randomize colors on load
    (function() {
      const GOOD = [6,11,13,14,15];
      colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
      baseColor = VGA[colorIdx];
      setWaveColor(VGA[colorIdx]);
      const _uiPool = GOOD.filter(i => i !== colorIdx);
      uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
      const _uc = VGA[uiColorIdx];
      if (btn)   btn.style.color   = _uc;
      if (opsEl) opsEl.style.color = _uc;
      if (zkoEl) zkoEl.style.color = _uc;
      const _ck = document.getElementById('ckey');
      const _tk = document.getElementById('tgkeys');
      const _sp = document.getElementById('speed');
      if (_ck) _ck.style.color = _uc;
      if (_tk) _tk.style.color = _uc;
      if (_sp) _sp.style.color = _uc;
    })();

    loop();

  // ── postMessage bridge (keyboard from parent window) ──────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'key') {
      if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
      window.dispatchEvent(new KeyboardEvent('keydown', {key:e.data.key, shiftKey:!!e.data.shiftKey, bubbles:true}));
    }
    else if (e.data?.type === 'keyup')
      window.dispatchEvent(new KeyboardEvent('keyup', {key:e.data.key, bubbles:true}));
    else if (e.data?.type === 'audioData')
      parentAudio = e.data;
  });
</script>
</body>
</html>
