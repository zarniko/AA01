<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nodes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; height: 100vh; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
  .scanline {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 3;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  #grain-cv { z-index: 5; pointer-events: none; }
  #cv { z-index: 1; }
  #btn {
    all: unset; position: fixed; top: 20px; left: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 3px; cursor: pointer;
  }
  #tgkeys {
    position: fixed; top: 54px; left: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 3px; display: flex; gap: 1ch;
  }
  #tkey { cursor: pointer; }
  #legend {
    position: fixed; top: 20px; right: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    display: grid; grid-template-columns: repeat(8, 1em);
    gap: 4px 6px; line-height: 1.4; text-align: center;
  }
  #ckey {
    position: fixed; top: 68px; right: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    color: #39ff14; text-align: center; pointer-events: none;
  }
  #ops {
    position: fixed; bottom: 20px; right: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px; letter-spacing: 3px;
  }
  #speed {
    position: fixed; bottom: 40px; right: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 3px; user-select: none;
  }
  #speed span { cursor: pointer; }
  #zko {
    position: fixed; bottom: 20px; left: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 3px; text-decoration: none; cursor: pointer;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<button id="btn"></button>
<div id="tgkeys"><div id="tkey">T</div></div>
<canvas id="grain-cv"></canvas>
<div id="legend"></div>
<div id="ckey">C</div>
<div id="ops"></div>
<div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
<a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
<canvas id="cv"></canvas>
<script>
'use strict';

const VGA = [
  '#000000','#0000AA','#00AA00','#00AAAA','#AA0000','#AA00AA','#AA5500',
  '#AAAAAA','#555555','#5555FF','#55FF55','#55FFFF','#FF5555','#FF55FF',
  '#FFFF55','#FFFFFF',
];
const POOL = '.,:;+*#@0123456789';
const rc = () => POOL[Math.random() * POOL.length | 0];
const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const btn = document.getElementById('btn');
const opsEl = document.getElementById('ops');
const zkoEl = document.getElementById('zko');
const legEl = document.getElementById('legend');

let W, H;
let lineColor  = '#39ff14';
let colorIdx   = 10;
let uiColorIdx = 14;
let cHeld      = false;
let cycleMs    = 140;
let cycleTimer = 0;
let ts         = 0;
let ampLevel   = 0;
let legendSpans = [];

// ── Audio ─────────────────────────────────────────────────────────
let analyser = null, timeDomain = null, freqData = null;
let micActive = false, micStream = null, audioCtx = null;
let parentAudio = null;

// ── Nodes ─────────────────────────────────────────────────────────
// Layout: 1 → 3 → 4 → 3 → 1 (left to right)
const NODE_LABELS = ['AL','BE','GA','DE','EP','ZE','ET','TH','IO','KA','LA','MU'];
const N = NODE_LABELS.length; // 12

let nodes = [];   // {x, y, r, val, pulse}

// Connections between adjacent layers; sign controls arc direction
const EDGES = [
  // layer 1 → 2
  [0,1,-1],[0,2, 0],[0,3, 1],
  // layer 2 → 3
  [1,4,-1],[1,5, 1],[2,5,-1],[2,6, 1],[3,6,-1],[3,7, 1],
  // layer 3 → 4
  [4,8,-1],[4,9, 1],[5,8,-1],[5,9, 1],[6,9,-1],[6,10, 1],[7,9,-1],[7,10, 1],
  // layer 4 → 5
  [8,11,-1],[9,11, 0],[10,11, 1],
];

// Per-edge pulse (audio threshold crossing)
let edgePulses = new Array(EDGES.length).fill(0);

// Band thresholds — 4 bands each map to edge group
const THRESHOLDS = [0.04, 0.08, 0.14, 0.22, 0.35];
let bandWasHigh = new Array(THRESHOLDS.length).fill(false);

function buildNodes() {
  const nr = Math.min(W, H) * 0.025;
  const s  = Math.min(W, H) * 0.14;
  const groups = [
    { x: W * 0.10, ys: [0] },
    { x: W * 0.27, ys: [-s, 0, s] },
    { x: W * 0.50, ys: [-1.5*s, -0.5*s, 0.5*s, 1.5*s] },
    { x: W * 0.73, ys: [-s, 0, s] },
    { x: W * 0.90, ys: [0] },
  ];
  nodes = [];
  groups.forEach(g => g.ys.forEach(dy => {
    nodes.push({ x: g.x, y: H / 2 + dy, r: nr, val: 0, pulse: 0 });
  }));
}

// ── Trigger ───────────────────────────────────────────────────────
function triggerPulse() {
  ampLevel = Math.min(3, ampLevel + 2);
  for (let i = 0; i < edgePulses.length; i++)
    edgePulses[i] = Math.min(1, edgePulses[i] + 0.6 + Math.random() * 0.4);
  for (let i = 0; i < nodes.length; i++)
    nodes[i].pulse = Math.min(1, (nodes[i].pulse || 0) + 0.5 + Math.random() * 0.5);
}

// ── Draw ──────────────────────────────────────────────────────────
function draw(now) {
  ctx.clearRect(0, 0, W, H);

  const doff = -ts * 0.014 * (1 + ampLevel * 1.5);

  const uiColor = VGA[uiColorIdx];
  ctx.strokeStyle = lineColor;
  ctx.fillStyle   = lineColor;
  ctx.shadowColor = lineColor;

  // ── Edges ──────────────────────────────────────────────────────
  for (let ei = 0; ei < EDGES.length; ei++) {
    const [a, b, sign] = EDGES[ei];
    const na = nodes[a], nb = nodes[b];
    const ep = edgePulses[ei];

    const mx  = (na.x + nb.x) / 2;
    const my  = (na.y + nb.y) / 2;
    const dx  = nb.x - na.x, dy = nb.y - na.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const bulge = len * (0.28 + ep * 0.18) * sign;
    const cpx = mx - (dy / len) * bulge;
    const cpy = my + (dx / len) * bulge;

    const active = ep > 0.05;
    ctx.globalAlpha = Math.min(1, 0.30 + ep * 0.55 + ampLevel * 0.08);
    ctx.lineWidth   = 0.8 + ep * 2.0;
    ctx.shadowBlur  = 2 + ep * 10;
    ctx.strokeStyle = active ? uiColor : lineColor;
    ctx.shadowColor = active ? uiColor : lineColor;
    ctx.setLineDash([4, 7]);
    ctx.lineDashOffset = doff * (1 + ei * 0.07);
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.quadraticCurveTo(cpx, cpy, nb.x, nb.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.strokeStyle = lineColor;
  ctx.shadowColor = lineColor;

  // ── Nodes ──────────────────────────────────────────────────────
  for (let i = 0; i < nodes.length; i++) {
    const n  = nodes[i];
    const np = n.pulse || 0;
    const r  = n.r * (1 + np * 0.4 + ampLevel * 0.12);

    // circle
    ctx.globalAlpha = Math.min(1, 0.75 + np * 0.25);
    ctx.lineWidth   = 1.0 + np * 1.5;
    ctx.shadowBlur  = 4 + np * 14 + ampLevel * 6;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.stroke();

    // label
    ctx.globalAlpha  = 0.55 + np * 0.35;
    ctx.shadowBlur   = 2;
    ctx.fillStyle    = uiColor;
    ctx.font         = `14px 'Share Tech Mono', monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(NODE_LABELS[i], n.x, n.y - r - 12);

    // value
    ctx.globalAlpha  = 0.40 + np * 0.45 + ampLevel * 0.1;
    ctx.font         = `14px 'Share Tech Mono', monospace`;
    ctx.fillText(String(Math.round(n.val)).padStart(2, '0'), n.x, n.y);
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;
}

// ── Frame loop ────────────────────────────────────────────────────
function frame(now) {
  // Audio
  if (micActive || parentAudio) {
    let rms, fd;
    if (micActive) {
      analyser.getByteTimeDomainData(timeDomain);
      let ss = 0;
      for (let i = 0; i < timeDomain.length; i++) {
        const d = timeDomain[i] / 255 - 0.5; ss += d * d;
      }
      rms = Math.sqrt(ss / timeDomain.length);
      analyser.getByteFrequencyData(freqData);
      fd = freqData;
    } else { rms = parentAudio.rms; fd = parentAudio.freqData; }

    ampLevel += (rms * 7 - ampLevel) * 0.22;

    // Band threshold → pulse random edge
    if (fd) {
      const len = fd.length;
      const bands = [
        fd.slice(0, Math.floor(len * 0.07)),
        fd.slice(Math.floor(len * 0.07), Math.floor(len * 0.30)),
        fd.slice(Math.floor(len * 0.30), Math.floor(len * 0.75)),
        fd.slice(Math.floor(len * 0.75)),
      ];
      // Update node values from band energy — 3 nodes per band
      bands.forEach((band, bi) => {
        const energy = band.reduce((s, v) => s + v, 0) / band.length / 255 * 99;
        for (let k = 0; k < 3; k++) {
          const ni = bi * 3 + k;
          if (nodes[ni]) nodes[ni].val += (energy - nodes[ni].val) * 0.15;
        }
      });
    }

    // Threshold crossings → pulse edges
    THRESHOLDS.forEach((t, i) => {
      if (rms > t && !bandWasHigh[i]) {
        const ei = Math.floor(Math.random() * EDGES.length);
        edgePulses[ei] = Math.min(1, edgePulses[ei] + 0.7);
        const ni = EDGES[ei][Math.random() < 0.5 ? 0 : 1];
        nodes[ni].pulse = Math.min(1, (nodes[ni].pulse || 0) + 0.5);
        bandWasHigh[i] = true;
      }
      if (rms < t * 0.6) bandWasHigh[i] = false;
    });

  } else {
    ampLevel *= 0.94;
    for (let i = 0; i < nodes.length; i++) nodes[i].val *= 0.97;
  }

  // Decay
  for (let i = 0; i < edgePulses.length; i++) edgePulses[i] *= 0.91;
  for (let i = 0; i < nodes.length; i++) nodes[i].pulse = (nodes[i].pulse || 0) * 0.90;

  draw(now);

  // Legend cycle
  if (now - cycleTimer > cycleMs) {
    cycleTimer = now;
    legendSpans.forEach(s => s.textContent = rc());
    btn.textContent   = rb();
    opsEl.textContent = rc() + rc() + rc();
    zkoEl.textContent = rc() + rc() + rc();
  }

  // Grain
  drawGrain();

  ts++;
  requestAnimationFrame(frame);
}

// ── Grain ─────────────────────────────────────────────────────────
const grainEl = document.getElementById('grain-cv');
const grainCx = grainEl.getContext('2d');
let grainImg  = null;
function drawGrain() {
  const gW = Math.ceil(W / 2), gH = Math.ceil(H / 2);
  if (grainEl.width !== gW || grainEl.height !== gH) {
    grainEl.width = gW; grainEl.height = gH;
    grainImg = grainCx.createImageData(gW, gH);
  }
  const d = grainImg.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = Math.random() * 28 | 0;
  }
  grainCx.putImageData(grainImg, 0, 0);
}

// ── Legend ────────────────────────────────────────────────────────
function buildLegend() {
  legEl.innerHTML = '';
  legendSpans = [];
  VGA.forEach((col, i) => {
    const s = document.createElement('span');
    s.textContent = rc(); s.style.color = col; s.style.cursor = 'pointer';
    s.addEventListener('click', () => {
      if (cHeld) applyUiColor(col, i);
      else { colorIdx = i; lineColor = col; }
    });
    legEl.appendChild(s);
    legendSpans.push(s);
  });
}

function applyUiColor(col, idx) {
  uiColorIdx = idx;
  btn.style.color   = col;
  opsEl.style.color = col;
  zkoEl.style.color = col;
  document.getElementById('ckey').style.color   = col;
  document.getElementById('tgkeys').style.color = col;
  document.getElementById('speed').style.color  = col;
}

// ── Mic toggle ────────────────────────────────────────────────────
btn.addEventListener('click', async () => {
  if (micActive) {
    micActive = false;
    micStream?.getTracks().forEach(t => t.stop());
    audioCtx?.close();
    analyser = timeDomain = freqData = micStream = audioCtx = null;
    ampLevel = 0;
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.5;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    timeDomain = new Uint8Array(analyser.fftSize);
    freqData   = new Uint8Array(analyser.frequencyBinCount);
    micActive  = true;
  } catch {}
});

// ── Keyboard ──────────────────────────────────────────────────────
function handleKey(key) {
  if (key === 'ArrowLeft'  && !cHeld) { cycleMs = Math.min(560, cycleMs + 140); }
  if (key === 'ArrowRight' && !cHeld) { cycleMs = Math.max(140, cycleMs - 140); }
  if (key === 'ArrowUp'    && !cHeld) { colorIdx  = (colorIdx  - 1 + 16) % 16; lineColor = VGA[colorIdx]; }
  if (key === 'ArrowDown'  && !cHeld) { colorIdx  = (colorIdx  + 1) % 16; lineColor = VGA[colorIdx]; }
  if (key === 'ArrowUp'    &&  cHeld) { applyUiColor(VGA[(uiColorIdx - 1 + 16) % 16], (uiColorIdx - 1 + 16) % 16); }
  if (key === 'ArrowDown'  &&  cHeld) { applyUiColor(VGA[(uiColorIdx + 1) % 16], (uiColorIdx + 1) % 16); }
  if (key === 't' || key === 'T') triggerPulse();
}

window.addEventListener('keydown', e => {
  if (e.key === 'c' || e.key === 'C') { cHeld = true; return; }
  handleKey(e.key);
  if (e.isTrusted) window.parent?.postMessage({ type:'childKey', key:e.key, shiftKey:!!e.shiftKey }, '*');
});
window.addEventListener('keyup', e => {
  if (e.key === 'c' || e.key === 'C') cHeld = false;
  if (e.isTrusted) window.parent?.postMessage({ type:'childKeyup', key:e.key }, '*');
});

document.getElementById('tkey').addEventListener('click', triggerPulse);
cv.addEventListener('click', triggerPulse);
document.getElementById('slower').addEventListener('click', () => { cycleMs = Math.min(560, cycleMs + 140); });
document.getElementById('faster').addEventListener('click', () => { cycleMs = Math.max(140, cycleMs - 140); });

// ── postMessage bridge ────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data?.type === 'key') {
    if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
    handleKey(e.data.key);
  }
  if (e.data?.type === 'audioData') parentAudio = e.data;
});

// ── Resize ────────────────────────────────────────────────────────
function resize() {
  W = cv.width = grainEl.width = window.innerWidth;
  H = cv.height = grainEl.height = window.innerHeight;
  buildNodes();
}
window.addEventListener('resize', resize);

// ── Startup ───────────────────────────────────────────────────────
(function() {
  const GOOD = [6,11,13,14,15];
  colorIdx  = GOOD[Math.random() * GOOD.length | 0];
  lineColor = VGA[colorIdx];
  const pool = GOOD.filter(i => i !== colorIdx);
  uiColorIdx = pool[Math.random() * pool.length | 0];
  const uc = VGA[uiColorIdx];
  btn.style.color   = uc;
  opsEl.style.color = uc;
  zkoEl.style.color = uc;
  document.getElementById('ckey').style.color   = uc;
  document.getElementById('tgkeys').style.color = uc;
  document.getElementById('speed').style.color  = uc;
})();

buildLegend();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
