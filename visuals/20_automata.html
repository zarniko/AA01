<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Automata</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a0f00 0%, #000 70%);
    z-index: 0;
  }
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 2;
  }
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }
  #btn {
    all: unset;
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #39ff14;
    letter-spacing: 3px;
    cursor: pointer;
  }
  #legend {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    display: grid;
    grid-template-columns: repeat(8, 1em);
    gap: 4px 6px;
    line-height: 1.4;
    text-align: center;
  }
  #zko {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    text-decoration: none;
    cursor: pointer;
  }
  #ops {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
  }
  #speed {
    position: fixed;
    bottom: 40px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    user-select: none;
  }
  #speed span { cursor: pointer; }
  #tgkeys {
    position: fixed;
    top: 54px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    display: flex;
    gap: 1ch;
  }
  #tkey { cursor: pointer; }
  #grain-cv {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  #ckey {
    position: fixed;
    top: 68px;
    right: 24px;
    width: 1em;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.4;
    color: #39ff14;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<button id="btn"></button>
<div id="tgkeys"><div id="tkey">T</div></div>
<div id="legend"></div>
<div id="ops"></div>
<div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
<div id="ckey">C</div>
<a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
<canvas id="grain-cv"></canvas>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  let W, H;
  const N_CELLS = 120;  // cells per ring
  const RING_GAP = 12;  // pixels between rings

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);

  // ── Character helpers ─────────────────────────────────────
  const POOL = '.,:;+*#@0123456789';
  const rc = () => POOL[Math.floor(Math.random() * POOL.length)];
  const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));

  const VGA = [
    '#000000','#0000AA','#00AA00','#00AAAA',
    '#AA0000','#AA00AA','#AA5500','#AAAAAA',
    '#555555','#5555FF','#55FF55','#55FFFF',
    '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
  ];

  // ── State ─────────────────────────────────────────────────
  let cycleMs   = 140;
  let lineColor  = '#39ff14';
  let colorIdx   = 10;
  let uiColorIdx = 10;
  let ampLevel  = 0;
  let ampWasHigh = false;

  // ── Audio ─────────────────────────────────────────────────
  let micActive = false, micStream = null, audioCtx = null, analyser = null, timeDomain = null;
  let parentAudio = null;

  // ── CA Rules ──────────────────────────────────────────────
  const RULES = [30, 45, 60, 90, 94, 110, 122, 150, 182];
  let ruleIdx = 0;
  let currentRule = RULES[ruleIdx];

  function applyRule(row) {
    const n = row.length;
    const next = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
      const l = row[(i - 1 + n) % n], c = row[i], r = row[(i + 1) % n];
      const idx = (l << 2) | (c << 1) | r;
      next[i] = (currentRule >> idx) & 1;
    }
    return next;
  }

  // rings[0] = newest (innermost), rings[last] = oldest (outermost/fading)
  let rings = [];

  function initRings() {
    const seed = new Uint8Array(N_CELLS);
    seed[Math.floor(N_CELLS / 2)] = 1;
    rings = [seed];
  }

  function updateRuleLabel() {
    const opsEl = document.getElementById('ops');
    if (opsEl) opsEl.textContent = rc() + rc() + rc() + rc();
  }

  function triggerRule() {
    ruleIdx = (ruleIdx + 1) % RULES.length;
    currentRule = RULES[ruleIdx];
    updateRuleLabel();
  }

  // ── Step interval ─────────────────────────────────────────
  let stepId = null;

  function step() {
    if (!rings.length) return;
    const next = applyRule(rings[0]);
    if (ampLevel > 0.05) {
      for (let i = 0; i < next.length; i++) {
        if (Math.random() < ampLevel * 0.08) next[i] ^= 1;
      }
    }
    rings.unshift(next);
    const maxRings = Math.floor(Math.min(W, H) * 0.5 / RING_GAP) + 2;
    if (rings.length > maxRings) rings.pop();
  }

  function restartStep() {
    if (stepId !== null) clearInterval(stepId);
    stepId = setInterval(step, cycleMs);
  }

  // ── Render ────────────────────────────────────────────────
  function frame() {
    // Audio handling
    if (micActive || parentAudio) {
      let rms;
      if (micActive) {
        analyser.getByteTimeDomainData(timeDomain);
        let sq = 0;
        for (let k = 0; k < timeDomain.length; k++) {
          const d = timeDomain[k] / 255 - 0.5;
          sq += d * d;
        }
        rms = Math.sqrt(sq / timeDomain.length);
      } else {
        rms = parentAudio.rms;
      }
      ampLevel += (rms * 5 - ampLevel) * 0.15;
      if (rms > 0.06 && !ampWasHigh) {
        triggerRule();
        ampWasHigh = true;
      } else if (rms < 0.036) {
        ampWasHigh = false;
      }
    } else {
      ampLevel *= 0.92;
    }

    ctx.clearRect(0, 0, W, H);

    if (rings.length === 0) {
      requestAnimationFrame(frame);
      return;
    }

    ctx.font         = '14px "Share Tech Mono", monospace';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    const cx       = W / 2;
    const cy       = H / 2;
    const maxRings = Math.floor(Math.min(W, H) * 0.5 / RING_GAP);

    ctx.fillStyle   = lineColor;
    ctx.shadowColor = lineColor;
    ctx.shadowBlur  = 0;

    for (let ri = 0; ri < rings.length; ri++) {
      const fade = Math.max(0, 1 - ri / maxRings);
      if (fade <= 0.01) break;
      ctx.globalAlpha = 0.9 * fade;
      const row    = rings[ri];
      const radius = (ri + 1) * RING_GAP;
      for (let ci = 0; ci < row.length; ci++) {
        if (!row[ci]) continue;
        const angle = (ci / N_CELLS) * Math.PI * 2 - Math.PI / 2;
        ctx.fillText(rc(), cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
      }
    }

    ctx.globalAlpha = 1;

    requestAnimationFrame(frame);
  }

  // ── Init ──────────────────────────────────────────────────
  resize();
  initRings();
  restartStep();
  requestAnimationFrame(frame);

  // ── Grain ─────────────────────────────────────────────────
  let grainOn = true;
  const grainEl = document.getElementById('grain-cv');
  const grainCx = grainEl.getContext('2d');
  let grainImg = null;
  function drawGrainFrame() {
    if (!grainOn) return;
    const gW = Math.ceil(window.innerWidth  / 2);
    const gH = Math.ceil(window.innerHeight / 2);
    if (grainEl.width !== gW || grainEl.height !== gH) {
      grainEl.width = gW; grainEl.height = gH;
      grainImg = grainCx.createImageData(gW, gH);
    }
    const data = grainImg.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = Math.random() * 30 | 0;
    }
    grainCx.putImageData(grainImg, 0, 0);
    requestAnimationFrame(drawGrainFrame);
  }
  function toggleGrain() {
    grainOn = !grainOn;
    document.getElementById('gkey').style.opacity = grainOn ? '0.4' : '';
    if (grainOn) drawGrainFrame();
  }
  window.addEventListener('keydown', e => { if (e.key === 'g' || e.key === 'G') toggleGrain(); });
  drawGrainFrame();

  // ── Canvas click ──────────────────────────────────────────
  canvas.addEventListener('click', triggerRule);
  document.getElementById('tkey').addEventListener('click', triggerRule);

  // ── Speed UI ──────────────────────────────────────────────
  function updateSpeedUI() {
    const sl = document.getElementById('slower');
    const fa = document.getElementById('faster');
    sl.style.opacity       = cycleMs >= 560 ? '0.4' : '1';
    sl.style.pointerEvents = cycleMs >= 560 ? 'none' : '';
    fa.style.opacity       = cycleMs <= 70  ? '0.4' : '1';
    fa.style.pointerEvents = cycleMs <= 70  ? 'none' : '';
  }
  updateSpeedUI();

  document.getElementById('slower').addEventListener('click', () => {
    cycleMs = Math.min(560, cycleMs + 140);
    restartStep(); updateSpeedUI();
  });
  document.getElementById('faster').addEventListener('click', () => {
    cycleMs = Math.max(70, cycleMs - 140);
    restartStep(); updateSpeedUI();
  });

  // ── Legend ────────────────────────────────────────────────
  let cHeld = false;
  const legendEl    = document.getElementById('legend');
  const opsEl       = document.getElementById('ops');
  const zkoEl       = document.getElementById('zko');
  const btn         = document.getElementById('btn');

  const legendSpans = VGA.map(col => {
    const s = document.createElement('span');
    s.style.color  = col;
    s.style.cursor = 'pointer';
    s.textContent  = rc();
    s.addEventListener('click', () => {
      if (cHeld) {
        btn.style.color                                    = col;
        opsEl.style.color                                  = col;
        zkoEl.style.color                                  = col;
        document.getElementById('ckey').style.color        = col;
        document.getElementById('speed').style.color       = col;
        document.getElementById('tgkeys').style.color      = col;
      } else {
        lineColor = col;
        colorIdx  = VGA.indexOf(col);
      }
    });
    legendEl.appendChild(s);
    return s;
  });

  // Initial label content
  zkoEl.textContent = rc() + rc() + rc() + rc();
  btn.textContent   = rb();
  updateRuleLabel();

  // ── Label flicker (200ms) ─────────────────────────────────
  setInterval(() => {
    zkoEl.textContent = rc() + rc() + rc() + rc();
    updateRuleLabel();
    legendSpans.forEach(s => s.textContent = rc());
  }, 200);

  // ── Braille btn cycle (140ms) ─────────────────────────────
  setInterval(() => {
    btn.textContent = rb();
  }, 140);

  // ── Mic toggle ────────────────────────────────────────────
  btn.addEventListener('click', async () => {
    if (micActive) {
      micActive = false;
      btn.style.opacity = '0.4';
      micStream?.getTracks().forEach(t => t.stop());
      audioCtx?.close();
      micStream = audioCtx = analyser = timeDomain = null;
      ampLevel = 0;
      return;
    }
    try {
      micStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      const src  = audioCtx.createMediaStreamSource(micStream);
      analyser   = audioCtx.createAnalyser();
      analyser.fftSize               = 2048;
      analyser.smoothingTimeConstant = 0.5;
      src.connect(analyser);
      timeDomain = new Uint8Array(analyser.fftSize);
      micActive  = true;
      btn.style.opacity = '';
    } catch { /* permission denied */ }
  });

  // ── Keyboard ──────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
    if (e.key === 't' || e.key === 'T') {
      triggerRule();
    } else if (e.key === 'ArrowLeft' && !cHeld) {
      cycleMs = Math.min(560, cycleMs + 140);
      restartStep(); updateSpeedUI();
    } else if (e.key === 'ArrowRight' && !cHeld) {
      cycleMs = Math.max(70, cycleMs - 140);
      restartStep(); updateSpeedUI();
    } else if (!cHeld && e.key === 'ArrowUp') {
      colorIdx  = (colorIdx - 1 + VGA.length) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (!cHeld && e.key === 'ArrowDown') {
      colorIdx  = (colorIdx + 1) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (cHeld && e.key === 'ArrowUp') {
      uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
      btn.style.color                                    = VGA[uiColorIdx];
      opsEl.style.color                                  = VGA[uiColorIdx];
      zkoEl.style.color                                  = VGA[uiColorIdx];
      document.getElementById('ckey').style.color        = VGA[uiColorIdx];
      document.getElementById('speed').style.color       = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color      = VGA[uiColorIdx];
    } else if (cHeld && e.key === 'ArrowDown') {
      uiColorIdx = (uiColorIdx + 1) % VGA.length;
      btn.style.color                                    = VGA[uiColorIdx];
      opsEl.style.color                                  = VGA[uiColorIdx];
      zkoEl.style.color                                  = VGA[uiColorIdx];
      document.getElementById('ckey').style.color        = VGA[uiColorIdx];
      document.getElementById('speed').style.color       = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color      = VGA[uiColorIdx];
    } else if (e.key === 'c' || e.key === 'C') {
      cHeld = true;
    }
  });

  window.addEventListener('keyup', e => {
    if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*');
    if (e.key === 'c' || e.key === 'C') cHeld = false;
  });

  // ── postMessage bridge ────────────────────────────────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'key') {
      if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
      window.dispatchEvent(new KeyboardEvent('keydown', { key: e.data.key, shiftKey: !!e.data.shiftKey, bubbles: true }));
    }
    else if (e.data?.type === 'keyup')
      window.dispatchEvent(new KeyboardEvent('keyup', { key: e.data.key, bubbles: true }));
    else if (e.data?.type === 'audioData')
      parentAudio = e.data;
  });

  // Randomize colors on load
  (function() {
    const GOOD = [6,11,13,14,15];
    colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
    lineColor = VGA[colorIdx];
    const _uiPool = GOOD.filter(i => i !== colorIdx);
    uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
    const _uc = VGA[uiColorIdx];
    if (btn)   btn.style.color   = _uc;
    if (opsEl) opsEl.style.color = _uc;
    if (zkoEl) zkoEl.style.color = _uc;
    const _ck = document.getElementById('ckey');
    const _tk = document.getElementById('tgkeys');
    const _sp = document.getElementById('speed');
    if (_ck) _ck.style.color = _uc;
    if (_tk) _tk.style.color = _uc;
    if (_sp) _sp.style.color = _uc;
  })();
</script>
</body>
</html>
