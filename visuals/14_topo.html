<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Topo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a0f00 0%, #000 70%);
    z-index: 0;
  }
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 2;
  }
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }
  #btn {
    all: unset;
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #39ff14;
    letter-spacing: 3px;
    cursor: pointer;
  }
  #tgkeys {
    position: fixed;
    top: 54px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    display: flex;
    gap: 1ch;
  }
  #tkey { cursor: pointer; }
  #legend {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    display: grid;
    grid-template-columns: repeat(8, 1em);
    gap: 4px 6px;
    line-height: 1.4;
    text-align: center;
  }
  #zko {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    text-decoration: none;
    cursor: pointer;
  }
  #ops {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
  }
  #speed {
    position: fixed;
    bottom: 40px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    user-select: none;
  }
  #speed span { cursor: pointer; }
  #ckey {
    position: fixed;
    top: 68px;
    right: 24px;
    width: 1em;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.4;
    color: #39ff14;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<button id="btn"></button>
<div id="tgkeys">
  <div id="tkey">T</div>
</div>
<div id="legend"></div>
<div id="ops"></div>
<div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
<div id="ckey">C</div>
<a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Constants ────────────────────────────────────────────
  const GRID   = 110;
  const L_STEP = 0.058;
  const L_AMP  = 0.82;

  // Marching squares: bit 3=TL, 2=TR, 1=BR, 0=BL; edges: 0=top,1=right,2=bottom,3=left
  const MS = [
    [],               // 0
    [[2, 3]],         // 1  BL
    [[1, 2]],         // 2  BR
    [[1, 3]],         // 3  BR+BL
    [[0, 1]],         // 4  TR
    [[0, 1], [2, 3]], // 5  TR+BL  (saddle)
    [[0, 2]],         // 6  TR+BR
    [[0, 3]],         // 7  TR+BR+BL
    [[0, 3]],         // 8  TL
    [[0, 2]],         // 9  TL+BL
    [[0, 3], [1, 2]], // 10 TL+BR  (saddle)
    [[0, 1]],         // 11 TL+BR+BL
    [[1, 3]],         // 12 TL+TR
    [[1, 2]],         // 13 TL+TR+BL
    [[2, 3]],         // 14 TL+TR+BR
    [],               // 15
  ];

  // Bidirectional levels — cover both peaks and valleys
  const levels = [];
  for (let l = -L_AMP + L_STEP * 0.5; l < L_AMP; l += L_STEP) levels.push(l);

  const field = new Float32Array((GRID + 1) * (GRID + 1));

  // ── Grain ────────────────────────────────────────────────
  let grainOn  = true;
  const grainCv = document.createElement('canvas');
  const grainCx = grainCv.getContext('2d');
  let grainImg  = null;

  function drawGrain() {
    const gW = Math.ceil(W / 2);
    const gH = Math.ceil(H / 2);
    if (grainCv.width !== gW || grainCv.height !== gH) {
      grainCv.width  = gW;
      grainCv.height = gH;
      grainImg = grainCx.createImageData(gW, gH);
    }
    const data = grainImg.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = Math.random() * 30 | 0;
    }
    grainCx.putImageData(grainImg, 0, 0);
    ctx.drawImage(grainCv, 0, 0, W, H);
  }

  // ── State ────────────────────────────────────────────────
  let extraAmp   = 0;
  let ampLevel   = 0;
  let timePh     = 0;
  let rippleR    = 99;
  let rippleAmp  = 0;
  let lastPulse  = 0;
  let lineColor  = '#39ff14';
  let colorIdx   = 10;
  let uiColorIdx = 10;

  // ── Audio ────────────────────────────────────────────────
  let analyser = null, timeDomain = null;
  let micActive = false, micStream = null, audioCtx = null;
  let parentAudio = null;

  // ── Grid helpers ─────────────────────────────────────────
  // Full-canvas mapping — terrain fills entire screen
  function gridToScreen(gx, gy) {
    return [gx / GRID * W, gy / GRID * H];
  }

  function edgePt(i, j, e, vTL, vTR, vBL, vBR, lev) {
    let t, gx, gy;
    if      (e === 0) { t = (lev - vTL) / (vTR - vTL); gx = i + t; gy = j;     }
    else if (e === 1) { t = (lev - vTR) / (vBR - vTR); gx = i + 1; gy = j + t; }
    else if (e === 2) { t = (lev - vBL) / (vBR - vBL); gx = i + t; gy = j + 1; }
    else              { t = (lev - vTL) / (vBL - vTL); gx = i;     gy = j + t; }
    return gridToScreen(gx, gy);
  }

  // ── Animation ────────────────────────────────────────────
  function frame() {
    // Audio
    if (micActive || parentAudio) {
      let rms;
      if (micActive) {
        analyser.getByteTimeDomainData(timeDomain);
        let sq = 0;
        for (let k = 0; k < timeDomain.length; k++) {
          const d = timeDomain[k] / 255 - 0.5; sq += d * d;
        }
        rms = Math.sqrt(sq / timeDomain.length);
      } else { rms = parentAudio.rms; }
      ampLevel += (rms * 5 - ampLevel) * 0.12;
      if (rms > 0.04) triggerSegment();
    } else {
      ampLevel *= 0.93;
    }

    extraAmp += (ampLevel * 0.45 - extraAmp) * 0.08;
    timePh   += 0.0035;
    const totalAmp = 1.0 + extraAmp;

    // Ripple (UV space: center = 0.5, 0.5; radius expands to ~0.75)
    rippleR   += 0.010;
    rippleAmp *= 0.975;

    // Build field — multi-peak sinusoidal terrain, fills entire canvas
    const AR = W / H;
    for (let j = 0; j <= GRID; j++) {
      for (let i = 0; i <= GRID; i++) {
        const ux = i / GRID;       // [0, 1]
        const uy = j / GRID;       // [0, 1]
        // Terrain coords — aspect-corrected so features look proportional
        const tx = ux * 2.6 * AR;
        const ty = uy * 2.6;

        // 5-component sinusoidal landscape — multiple peaks and ridges
        const h0 = (
          Math.sin(tx * 1.9 + timePh * 0.18 + 0.4)  * Math.cos(ty * 1.6 - timePh * 0.14 + 1.0) * 0.38 +
          Math.sin(tx * 3.1 - timePh * 0.26 + 1.7)  * Math.cos(ty * 2.8 + timePh * 0.21 - 0.5) * 0.26 +
          Math.sin(tx * 1.1 + timePh * 0.13 - 1.1)  * Math.cos(ty * 3.5 - timePh * 0.22 + 0.6) * 0.20 +
          Math.sin(tx * 4.4 - timePh * 0.32 + 0.8)  * Math.cos(ty * 1.4 + timePh * 0.28 - 1.2) * 0.11 +
          Math.sin(tx * 2.3 + timePh * 0.22 - 0.3)  * Math.cos(ty * 4.2 - timePh * 0.17 + 2.0) * 0.07
        ) * totalAmp;

        // Ripple from screen center (UV space)
        let h = h0;
        if (rippleAmp > 0.002) {
          const ru = ux - 0.5, rv = uy - 0.5;
          const rr = Math.sqrt(ru * ru + rv * rv);
          const dr = rr - rippleR;
          h += rippleAmp * Math.exp(-dr * dr * 5) * Math.sin(dr * 9);
        }

        field[j * (GRID + 1) + i] = h;
      }
    }

    ctx.clearRect(0, 0, W, H);

    // Glow passes
    const passes = [
      { blur: 16, alpha: 0.20, lw: 2.8 },
      { blur: 5,  alpha: 0.52, lw: 1.3 },
      { blur: 0,  alpha: 0.90, lw: 0.7 },
    ];

    for (const { blur, alpha, lw } of passes) {
      ctx.strokeStyle = lineColor;
      ctx.shadowColor = lineColor;
      ctx.shadowBlur  = blur;
      ctx.lineWidth   = lw;
      ctx.globalAlpha = alpha;
      ctx.beginPath();

      for (const lev of levels) {
        for (let j = 0; j < GRID; j++) {
          for (let i = 0; i < GRID; i++) {
            const vTL = field[ j      * (GRID + 1) + i    ];
            const vTR = field[ j      * (GRID + 1) + i + 1];
            const vBL = field[(j + 1) * (GRID + 1) + i    ];
            const vBR = field[(j + 1) * (GRID + 1) + i + 1];
            const ci  = (vTL > lev ? 8 : 0) | (vTR > lev ? 4 : 0)
                      | (vBR > lev ? 2 : 0) | (vBL > lev ? 1 : 0);
            for (const [e0, e1] of MS[ci]) {
              const [x0, y0] = edgePt(i, j, e0, vTL, vTR, vBL, vBR, lev);
              const [x1, y1] = edgePt(i, j, e1, vTL, vTR, vBL, vBR, lev);
              ctx.moveTo(x0, y0);
              ctx.lineTo(x1, y1);
            }
          }
        }
      }
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    if (grainOn) drawGrain();
    requestAnimationFrame(frame);
  }

  frame();

  // ── T key: seismic ripple ─────────────────────────────────
  function triggerSegment() {
    const now = performance.now();
    if (now - lastPulse < 300) return;
    lastPulse = now;
    rippleR   = 0;
    rippleAmp = 0.028;
  }
  function toggleGrain() {
    grainOn = !grainOn;
  }
  window.addEventListener('keydown', e => {
    if (e.key === 't' || e.key === 'T') triggerSegment();
    if (e.key === 'g' || e.key === 'G') toggleGrain();
  });
  document.getElementById('tkey').addEventListener('click', triggerSegment);
  canvas.addEventListener('click', triggerSegment);

  // ── Mic toggle ────────────────────────────────────────────
  const btn = document.getElementById('btn');
  btn.addEventListener('click', async () => {
    if (micActive) {
      micActive = false;
      btn.style.opacity = '0.4';
      micStream?.getTracks().forEach(t => t.stop());
      audioCtx?.close();
      micStream = audioCtx = analyser = timeDomain = null;
      ampLevel = 0;
      return;
    }
    try {
      micStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      const src  = audioCtx.createMediaStreamSource(micStream);
      analyser   = audioCtx.createAnalyser();
      analyser.fftSize               = 2048;
      analyser.smoothingTimeConstant = 0.5;
      src.connect(analyser);
      timeDomain = new Uint8Array(analyser.fftSize);
      micActive  = true;
      btn.style.opacity = '';
    } catch { /* permission denied */ }
  });

  // ── C-key modifier ────────────────────────────────────────
  let cHeld = false;
  window.addEventListener('keyup',   e => { if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*'); if (e.key==='c'||e.key==='C') cHeld=false; });

  // ── VGA 16-color legend ───────────────────────────────────
  const POOL   = '.,:;+*#@0123456789';
  const PRIMES = ['2','3','5','7','11','13','17','19','/'];
  const rc = () => POOL[Math.floor(Math.random() * POOL.length)];
  const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));
  const rp = () => PRIMES[Math.floor(Math.random() * PRIMES.length)];
  const VGA = [
    '#000000','#0000AA','#00AA00','#00AAAA',
    '#AA0000','#AA00AA','#AA5500','#AAAAAA',
    '#555555','#5555FF','#55FF55','#55FFFF',
    '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
  ];
  const legendEl    = document.getElementById('legend');
  const legendSpans = VGA.map(col => {
    const s = document.createElement('span');
    s.style.color  = col;
    s.style.cursor = 'pointer';
    s.textContent  = rc();
    s.addEventListener('click', () => {
      if (cHeld) {
        btn.style.color  = col;
        opsEl.style.color = col;
        zkoEl.style.color = col;
        document.getElementById('ckey').style.color   = col;
        document.getElementById('tgkeys').style.color = col;
        document.getElementById('speed').style.color  = col;
      } else {
        lineColor = col;
        colorIdx  = VGA.indexOf(col);
      }
    });
    legendEl.appendChild(s);
    return s;
  });

  const zkoEl = document.getElementById('zko');
  zkoEl.textContent = rc()+rc()+rc()+rc();
  btn.textContent   = rb();
  const opsEl = document.getElementById('ops');
  opsEl.textContent = rp()+rp();

  let cycleMs = 140;
  function cycleFn() {
    btn.textContent   = rb();
    opsEl.textContent = rp()+rp();
    zkoEl.textContent = rc()+rc()+rc()+rc();
    legendSpans.forEach(s => s.textContent = rc());
  }
  let cycleId = setInterval(cycleFn, cycleMs);

  function updateSpeedUI() {
    const sl = document.getElementById('slower');
    const fa = document.getElementById('faster');
    sl.style.opacity       = cycleMs >= 560 ? '0.4' : '1';
    sl.style.pointerEvents = cycleMs >= 560 ? 'none' : '';
    fa.style.opacity       = cycleMs <= 140 ? '0.4' : '1';
    fa.style.pointerEvents = cycleMs <= 140 ? 'none' : '';
  }
  updateSpeedUI();

  document.getElementById('slower').addEventListener('click', () => {
    cycleMs = Math.min(560, cycleMs + 140);
    clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
  });
  document.getElementById('faster').addEventListener('click', () => {
    cycleMs = Math.max(140, cycleMs - 140);
    clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
  });

  window.addEventListener('keydown', e => {
    if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
    if (e.key === 'c' || e.key === 'C') { cHeld = true; return; }
    if      (e.key === 'ArrowLeft'  && !cHeld) {
      cycleMs = Math.min(560, cycleMs + 140);
      clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
    } else if (e.key === 'ArrowRight' && !cHeld) {
      cycleMs = Math.max(140, cycleMs - 140);
      clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
    } else if (!cHeld && e.key === 'ArrowUp') {
      colorIdx = (colorIdx - 1 + VGA.length) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (!cHeld && e.key === 'ArrowDown') {
      colorIdx = (colorIdx + 1) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (cHeld && e.key === 'ArrowUp') {
      uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
      btn.style.color  = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    } else if (cHeld && e.key === 'ArrowDown') {
      uiColorIdx = (uiColorIdx + 1) % VGA.length;
      btn.style.color  = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    }
  });

  // ── postMessage bridge (keyboard from parent window) ──────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'key') {
      if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
      window.dispatchEvent(new KeyboardEvent('keydown', {key:e.data.key, shiftKey:!!e.data.shiftKey, bubbles:true}));
    }
    else if (e.data?.type === 'keyup')
      window.dispatchEvent(new KeyboardEvent('keyup', {key:e.data.key, bubbles:true}));
    else if (e.data?.type === 'audioData')
      parentAudio = e.data;
  });

  // Randomize colors on load
  (function() {
    const GOOD = [6,11,13,14,15];
    colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
    lineColor = VGA[colorIdx];
    const _uiPool = GOOD.filter(i => i !== colorIdx);
    uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
    const _uc = VGA[uiColorIdx];
    if (btn)   btn.style.color   = _uc;
    if (opsEl) opsEl.style.color = _uc;
    if (zkoEl) zkoEl.style.color = _uc;
    const _ck = document.getElementById('ckey');
    const _tk = document.getElementById('tgkeys');
    const _sp = document.getElementById('speed');
    if (_ck) _ck.style.color = _uc;
    if (_tk) _tk.style.color = _uc;
    if (_sp) _sp.style.color = _uc;
  })();
</script>
</body>
</html>
