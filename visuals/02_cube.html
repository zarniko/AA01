<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a0f00 0%, #000 70%);
    z-index: 0;
  }
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 2;
  }
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }
  #btn {
    all: unset;
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #39ff14;
    letter-spacing: 3px;
    cursor: pointer;
  }
  #rgkeys {
    position: fixed;
    top: 54px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    display: flex;
    gap: 1ch;
  }
  #rkey { cursor: pointer; }
  #grain-cv {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }
  #legend {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    display: grid;
    grid-template-columns: repeat(8, 1em);
    gap: 4px 6px;
    line-height: 1.4;
    text-align: center;
  }
  #zko {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    text-decoration: none;
    cursor: pointer;
  }
  #ops {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
  }
  #speed {
    position: fixed;
    bottom: 40px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    user-select: none;
  }
  #speed span { cursor: pointer; }
  #ckey {
    position: fixed;
    top: 68px;
    right: 24px;
    width: 1em;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.4;
    color: #39ff14;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<button id="btn"></button>
<div id="rgkeys"><div id="rkey">T</div></div>
<canvas id="grain-cv"></canvas>
<div id="legend"></div>
<div id="ops"></div>
<div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
<div id="ckey">C</div>
<a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
<canvas id="canvas"></canvas>
<script>
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  let lineColor = '#39ff14';

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let angle        = 0;
  let reverseUntil = 0;
  let lastFlipTime = 0;
  let ampLevel     = 0;
  let parentAudio  = null;

  // ── sound-triggered vertex connections ────────────────────
  const CONN_THRESHOLDS = [0.06, 0.12, 0.22, 0.36, 0.55];
  const connWasHigh     = new Array(CONN_THRESHOLDS.length).fill(false);
  let   activeConn      = null; // { a, b, startTs, duration }

  function triggerConn() {
    const a = Math.floor(Math.random() * 8);
    let b; do { b = Math.floor(Math.random() * 8); } while (b === a);
    activeConn = { a, b, startTs: performance.now(), duration: 1800 };
  }

  // ── audio state ───────────────────────────────────────────
  let analyser   = null;
  let timeDomain = null;
  let micActive  = false;
  let micStream  = null;
  let audioCtx   = null;

  // Cube vertices + binary labels (xyz bits)
  const verts = [
    [-1,-1,-1], // 0 → 000
    [ 1,-1,-1], // 1 → 100
    [ 1, 1,-1], // 2 → 110
    [-1, 1,-1], // 3 → 010
    [-1,-1, 1], // 4 → 001
    [ 1,-1, 1], // 5 → 101
    [ 1, 1, 1], // 6 → 111
    [-1, 1, 1], // 7 → 011
  ];
  const LABELS = ['000','100','110','010','001','101','111','011'];

  const edges = [
    [0,1],[1,2],[2,3],[3,0], // front face
    [4,5],[5,6],[6,7],[7,4], // back face
    [0,4],[1,5],[2,6],[3,7], // connecting
  ];

  const ISO_PITCH = Math.atan(1 / Math.sqrt(2));

  function rotateY([x,y,z], a) {
    return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)];
  }
  function rotateX([x,y,z], a) {
    return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)];
  }
  function project([x,y]) {
    const s = Math.min(canvas.width, canvas.height) * 0.187;
    return [x*s + canvas.width/2, -y*s + canvas.height/2];
  }

  function frame(ts) {
    if (micActive || parentAudio) {
      let rms;
      if (micActive) {
        analyser.getByteTimeDomainData(timeDomain);
        let sq = 0;
        for (let i = 0; i < timeDomain.length; i++) {
          const d = timeDomain[i] / 255 - 0.5; sq += d * d;
        }
        rms = Math.sqrt(sq / timeDomain.length);
      } else { rms = parentAudio.rms; }
      ampLevel += (rms * 3 - ampLevel) * 0.1;
      if (rms > 0.04) triggerReverse();
      for (let t = 0; t < CONN_THRESHOLDS.length; t++) {
        if (ampLevel > CONN_THRESHOLDS[t] && !connWasHigh[t]) {
          connWasHigh[t] = true;
          triggerConn();
        } else if (ampLevel < CONN_THRESHOLDS[t] * 0.6) {
          connWasHigh[t] = false;
        }
      }
    } else {
      ampLevel *= 0.95;
    }
    const reversed = ts < reverseUntil;
    const speed = 0.0075 + ampLevel * 0.025;
    angle += reversed ? -speed : speed;

    const tv = verts.map(v => rotateX(rotateY(v, angle), ISO_PITCH));
    const pv = tv.map(v => project(v));

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Multi-pass glow + sharp edges
    const passes = [
      { blur: 14, alpha: 0.22, width: 3.0 },
      { blur: 4,  alpha: 0.50, width: 1.5 },
      { blur: 0,  alpha: 0.90, width: 0.8 },
    ];
    for (const { blur, alpha, width } of passes) {
      ctx.strokeStyle = lineColor;
      ctx.shadowColor = lineColor;
      ctx.shadowBlur  = blur;
      ctx.lineWidth   = width;
      ctx.globalAlpha = alpha;
      for (const [a, b] of edges) {
        ctx.beginPath();
        ctx.moveTo(pv[a][0], pv[a][1]);
        ctx.lineTo(pv[b][0], pv[b][1]);
        ctx.stroke();
      }
    }

    // Dots at vertices
    ctx.fillStyle   = lineColor;
    ctx.shadowColor = lineColor;
    ctx.shadowBlur  = 10;
    ctx.globalAlpha = 0.95;
    for (const [px, py] of pv) {
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Active vertex connection (sound-triggered dashed line)
    if (activeConn) {
      const elapsed = performance.now() - activeConn.startTs;
      const frac    = Math.min(1, elapsed / activeConn.duration);
      const alpha   = frac < 0.75 ? 0.65 : 0.65 * (1 - (frac - 0.75) / 0.25);
      if (frac >= 1) {
        activeConn = null;
      } else {
        const [ax, ay] = pv[activeConn.a];
        const [bx, by] = pv[activeConn.b];
        ctx.strokeStyle    = lineColor;
        ctx.shadowColor    = lineColor;
        ctx.shadowBlur     = 6;
        ctx.globalAlpha    = alpha;
        ctx.lineWidth      = 0.8;
        ctx.setLineDash([3, 7]);
        ctx.lineDashOffset = -ts * 0.012;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineDashOffset = 0;
      }
    }

    // Binary labels with per-label flicker
    ctx.font         = '14px "Share Tech Mono", monospace';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = lineColor;
    ctx.shadowColor  = lineColor;

    function flickerAlpha(baseMin, baseMax, dropoutChance, doFlicker) {
      if (!doFlicker) return Math.min(1, baseMax * 0.85 + Math.min(0.15, ampLevel * 0.2));
      if (Math.random() < dropoutChance) return Math.random() * 0.12;
      const base = baseMin + Math.random() * (baseMax - baseMin);
      return Math.min(1, base + Math.min(0.25, ampLevel * 0.35));
    }

    const flickerSet = new Set();
    while (flickerSet.size < Math.round(8 / 3))
      flickerSet.add(Math.floor(Math.random() * 8));

    const cxc = canvas.width / 2, cyc = canvas.height / 2;
    for (let i = 0; i < 8; i++) {
      const [px, py] = pv[i];
      const dx = px - cxc, dy = py - cyc;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      ctx.textAlign   = px < cxc ? 'right' : 'left';
      ctx.globalAlpha = flickerAlpha(0.45, 0.85, 0.07, flickerSet.has(i));
      ctx.shadowBlur  = 4 + ampLevel * 7;
      ctx.fillText(LABELS[i], px + (dx/dist)*18, py + (dy/dist)*18);
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    requestAnimationFrame(frame);
  }

  frame();

  // ── R key: trigger reverse spin ───────────────────────────
  function triggerReverse() {
    const now = performance.now();
    if (now - lastFlipTime < 300) return;
    lastFlipTime = now;
    const dur = [500, 1000, 1500, 2000][Math.floor(Math.random() * 4)];
    reverseUntil = now < reverseUntil ? 0 : now + dur;
  }
  window.addEventListener('keydown', e => { if (e.key === 't' || e.key === 'T') triggerReverse(); });
  document.getElementById('rkey').addEventListener('click', triggerReverse);
  canvas.addEventListener('click', triggerConn);

  // ── Grain ────────────────────────────────────────────────
  let grainOn  = true;
  const grainEl = document.getElementById('grain-cv');
  const grainCx = grainEl.getContext('2d');
  let grainImg  = null;
  function drawGrainFrame() {
    if (!grainOn) return;
    const gW = Math.ceil(window.innerWidth  / 2);
    const gH = Math.ceil(window.innerHeight / 2);
    if (grainEl.width !== gW || grainEl.height !== gH) {
      grainEl.width  = gW;
      grainEl.height = gH;
      grainImg = grainCx.createImageData(gW, gH);
    }
    const data = grainImg.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = Math.random() * 30 | 0;
    }
    grainCx.putImageData(grainImg, 0, 0);
    requestAnimationFrame(drawGrainFrame);
  }
  function toggleGrain() {
    grainOn = !grainOn;
    if (grainOn) drawGrainFrame();
  }
  window.addEventListener('keydown', e => { if (e.key === 'g' || e.key === 'G') toggleGrain(); });
  drawGrainFrame();

  // ── mic toggle ───────────────────────────────────────────
  const btn = document.getElementById('btn');
  btn.addEventListener('click', async () => {
    if (micActive) {
      micActive = false;
      btn.style.opacity = '0.4';
      micStream?.getTracks().forEach(t => t.stop());
      audioCtx?.close();
      micStream = audioCtx = analyser = timeDomain = null;
      ampLevel  = 0;
      return;
    }
    try {
      micStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      const src  = audioCtx.createMediaStreamSource(micStream);
      analyser   = audioCtx.createAnalyser();
      analyser.fftSize               = 2048;
      analyser.smoothingTimeConstant = 0.5;
      src.connect(analyser);
      timeDomain = new Uint8Array(analyser.fftSize);
      micActive  = true;
      btn.style.opacity = '';
    } catch { /* permission denied */ }
  });

  // ── C-key modifier ────────────────────────────────────────
  let cHeld = false;
  window.addEventListener('keydown', e => { if (e.key === 'c' || e.key === 'C') cHeld = true; });
  window.addEventListener('keyup',   e => { if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*'); if (e.key === 'c' || e.key === 'C') cHeld = false; });

  // ── VGA 16-color legend ───────────────────────────────────
  const POOL   = '.,:;+*#@0123456789';
  const PRIMES = ['2','3','5','7','11','13','17','19','/'];
  const rc  = () => POOL[Math.floor(Math.random() * POOL.length)];
  const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));
  const rp  = () => PRIMES[Math.floor(Math.random() * PRIMES.length)];
  const VGA  = [
    '#000000','#0000AA','#00AA00','#00AAAA',
    '#AA0000','#AA00AA','#AA5500','#AAAAAA',
    '#555555','#5555FF','#55FF55','#55FFFF',
    '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
  ];
  const legendEl    = document.getElementById('legend');
  let colorIdx = 10;
  let uiColorIdx = 10;
  const legendSpans = VGA.map(col => {
    const s = document.createElement('span');
    s.style.color  = col;
    s.style.cursor = 'pointer';
    s.textContent  = rc();
    s.addEventListener('click', () => {
      if (cHeld) {
        btn.style.color  = col;
        opsEl.style.color = col;
        zkoEl.style.color = col;
        document.getElementById('ckey').style.color   = col;
        document.getElementById('rgkeys').style.color = col;
        document.getElementById('speed').style.color  = col;
      } else {
        lineColor = col;
      }
    });
    legendEl.appendChild(s);
    return s;
  });
  const zkoEl = document.getElementById('zko');
  zkoEl.textContent = rc()+rc()+rc()+rc();
  btn.textContent   = rb();
  const opsEl = document.getElementById('ops');
  opsEl.textContent = rp()+rp();
  let cycleMs = 140;
  function cycleFn() {
    btn.textContent   = rb();
    opsEl.textContent = rp()+rp();
    zkoEl.textContent = rc()+rc()+rc()+rc();
    legendSpans.forEach(s => s.textContent = rc());
  }
  let cycleId = setInterval(cycleFn, cycleMs);
  function updateSpeedUI() {
    const sl = document.getElementById('slower');
    const fa = document.getElementById('faster');
    sl.style.opacity       = cycleMs >= 560 ? '0.4' : '1';
    sl.style.pointerEvents = cycleMs >= 560 ? 'none' : '';
    fa.style.opacity       = cycleMs <= 140 ? '0.4' : '1';
    fa.style.pointerEvents = cycleMs <= 140 ? 'none' : '';
  }
  updateSpeedUI();
  document.getElementById('slower').addEventListener('click', () => {
    cycleMs = Math.min(560, cycleMs + 140);
    clearInterval(cycleId);
    cycleId = setInterval(cycleFn, cycleMs);
    updateSpeedUI();
  });
  document.getElementById('faster').addEventListener('click', () => {
    cycleMs = Math.max(140, cycleMs - 140);
    clearInterval(cycleId);
    cycleId = setInterval(cycleFn, cycleMs);
    updateSpeedUI();
  });
  window.addEventListener('keydown', e => {
    if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
    if (e.key === 'ArrowLeft' && !cHeld) {
      cycleMs = Math.min(560, cycleMs + 140);
      clearInterval(cycleId);
      cycleId = setInterval(cycleFn, cycleMs);
      updateSpeedUI();
    } else if (e.key === 'ArrowRight' && !cHeld) {
      cycleMs = Math.max(140, cycleMs - 140);
      clearInterval(cycleId);
      cycleId = setInterval(cycleFn, cycleMs);
      updateSpeedUI();
    } else if (!cHeld && e.key === 'ArrowUp') {
      colorIdx = (colorIdx - 1 + VGA.length) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (!cHeld && e.key === 'ArrowDown') {
      colorIdx = (colorIdx + 1) % VGA.length;
      lineColor = VGA[colorIdx];
    } else if (cHeld && e.key === 'ArrowUp') {
      uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
      btn.style.color   = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('rgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    } else if (cHeld && e.key === 'ArrowDown') {
      uiColorIdx = (uiColorIdx + 1) % VGA.length;
      btn.style.color   = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('rgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    }
  });

  // ── postMessage bridge (keyboard from parent window) ──────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'key') {
      if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
      window.dispatchEvent(new KeyboardEvent('keydown', {key:e.data.key, shiftKey:!!e.data.shiftKey, bubbles:true}));
    }
    else if (e.data?.type === 'keyup')
      window.dispatchEvent(new KeyboardEvent('keyup', {key:e.data.key, bubbles:true}));
    else if (e.data?.type === 'audioData')
      parentAudio = e.data;
  });

  // Randomize colors on load
  (function() {
    const GOOD = [6,11,13,14,15];
    colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
    lineColor = VGA[colorIdx];
    const _uiPool = GOOD.filter(i => i !== colorIdx);
    uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
    const _uc = VGA[uiColorIdx];
    if (btn)   btn.style.color   = _uc;
    if (opsEl) opsEl.style.color = _uc;
    if (zkoEl) zkoEl.style.color = _uc;
    const _ck = document.getElementById('ckey');
    const _tk = document.getElementById('tgkeys');
    const _sp = document.getElementById('speed');
    if (_ck) _ck.style.color = _uc;
    if (_tk) _tk.style.color = _uc;
    if (_sp) _sp.style.color = _uc;
  })();
</script>
</body>
</html>
