<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blob</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 2;
  }
  #btn {
    all: unset;
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #39ff14;
    letter-spacing: 3px;
    cursor: pointer;
  }
  #grain-cv {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }
  #legend {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    display: grid;
    grid-template-columns: repeat(8, 1em);
    gap: 4px 6px;
    line-height: 1.4;
    text-align: center;
  }
  #zko {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    text-decoration: none;
    cursor: pointer;
  }
  #ops {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
  }
  #speed {
    position: fixed;
    bottom: 40px;
    right: 24px;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: #39ff14;
    user-select: none;
  }
  #speed span { cursor: pointer; }
  #tgkeys {
    position: fixed; top: 54px; left: 24px; z-index: 6;
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    letter-spacing: 3px; color: #39ff14;
    display: flex; gap: 1ch;
  }
  #tkey { cursor: pointer; }
  #ckey {
    position: fixed;
    top: 68px;
    right: 24px;
    width: 1em;
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.4;
    color: #39ff14;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<button id="btn"></button>
<div id="tgkeys"><div id="tkey">T</div></div>
<canvas id="grain-cv"></canvas>
<div id="legend"></div>
<div id="ops"></div>
<div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
<div id="ckey">C</div>
<a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  let W, H;

  // Low-res offscreen canvas — rendered at 1/RES, scaled up for free smoothing blur
  const lowCv  = document.createElement('canvas');
  const lowCtx = lowCv.getContext('2d');
  const RES    = 6;
  let   imgData = null;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    lowCv.width  = Math.ceil(W / RES);
    lowCv.height = Math.ceil(H / RES);
    imgData = null;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Blob color sources ────────────────────────────────────
  // Each drifts on independent Lissajous-like trajectories.
  // bx/by: base position [0,1]   px/py: phase offset
  // fx/fy: drift frequency        ax/ay: drift amplitude
  // r/g/b: current color          tr/tg/tb: target color (morphed by VGA clicks)
  const BLOBS = [
    { bx:0.20, by:0.30, px:0.00, py:1.20, fx:0.31, fy:0.27, ax:0.32, ay:0.28, r:64,  g:64,  b:255, tr:64,  tg:64,  tb:255 },
    { bx:0.72, by:0.38, px:2.10, py:0.50, fx:0.23, fy:0.34, ax:0.28, ay:0.32, r:255, g:150, b:185, tr:255, tg:150, tb:185 },
    { bx:0.50, by:0.72, px:1.00, py:3.00, fx:0.19, fy:0.41, ax:0.38, ay:0.24, r:155, g:55,  b:255, tr:155, tg:55,  tb:255 },
    { bx:0.28, by:0.58, px:4.20, py:1.80, fx:0.37, fy:0.22, ax:0.24, ay:0.38, r:80,  g:110, b:255, tr:80,  tg:110, tb:255 },
    { bx:0.80, by:0.22, px:0.70, py:2.60, fx:0.28, fy:0.33, ax:0.32, ay:0.28, r:255, g:110, b:155, tr:255, tg:110, tb:155 },
    { bx:0.50, by:0.15, px:3.50, py:0.90, fx:0.42, fy:0.29, ax:0.20, ay:0.32, r:30,  g:28,  b:175, tr:30,  tg:28,  tb:175 },
  ];

  let t         = 0;
  let driftRate = 0.009; // base blob drift speed; shift+arrows adjust
  let morphIdx  = 0;     // which blob next VGA click targets

  // ── Audio ─────────────────────────────────────────────────
  let analyser = null, timeDomain = null;
  let micActive = false, micStream = null, audioCtx = null;
  let ampLevel = 0, speedBump = 0;
  let parentAudio = null;

  // ── Render loop ───────────────────────────────────────────
  function frame() {
    const lowW = lowCv.width;
    const lowH = lowCv.height;

    // Audio RMS → ampLevel and speed bump
    if (micActive || parentAudio) {
      let rms;
      if (micActive) {
        analyser.getByteTimeDomainData(timeDomain);
        let sq = 0;
        for (let k = 0; k < timeDomain.length; k++) {
          const d = timeDomain[k] / 255 - 0.5;
          sq += d * d;
        }
        rms = Math.sqrt(sq / timeDomain.length);
      } else { rms = parentAudio.rms; }
      ampLevel += (rms * 6 - ampLevel) * 0.15;
      if (rms > 0.06) speedBump = Math.max(speedBump, rms * 0.12);
    } else {
      ampLevel *= 0.92;
    }
    speedBump *= 0.94;

    t += (driftRate + speedBump) * (1 + ampLevel * 2);

    // Lerp each blob's current color toward its target
    for (const b of BLOBS) {
      b.r += (b.tr - b.r) * 0.02;
      b.g += (b.tg - b.g) * 0.02;
      b.b += (b.tb - b.b) * 0.02;
    }

    // Compute blob screen positions in low-res pixel space
    const pos = BLOBS.map(b => ({
      x: (b.bx + Math.sin(t * b.fx + b.px) * b.ax) * lowW,
      y: (b.by + Math.sin(t * b.fy + b.py) * b.ay) * lowH,
    }));

    // Softness radius² in pixel space; swells slightly with audio
    const baseS  = lowW * 0.18;
    const swell  = 1 + ampLevel * 0.6;
    const s2     = (baseS * swell) * (baseS * swell);

    if (!imgData || imgData.width !== lowW || imgData.height !== lowH) {
      imgData = lowCtx.createImageData(lowW, lowH);
    }
    const data = imgData.data;

    for (let j = 0; j < lowH; j++) {
      for (let i = 0; i < lowW; i++) {
        let rS = 0, gS = 0, bS = 0, wS = 0;
        for (let k = 0; k < BLOBS.length; k++) {
          const b  = BLOBS[k];
          const p  = pos[k];
          const dx = i - p.x;
          const dy = j - p.y;
          // w = s2/(d²+s2): equals 1 at center, 0.5 at d=baseS, decays smoothly
          const w  = s2 / (dx*dx + dy*dy + s2);
          rS += b.r * w;
          gS += b.g * w;
          bS += b.b * w;
          wS += w;
        }
        const idx    = (j * lowW + i) * 4;
        data[idx]    = rS / wS;
        data[idx+1]  = gS / wS;
        data[idx+2]  = bS / wS;
        data[idx+3]  = 255;
      }
    }

    lowCtx.putImageData(imgData, 0, 0);

    // Scale up — browser bilinear smoothing acts as a second free blur pass
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(lowCv, 0, 0, W, H);

    requestAnimationFrame(frame);
  }

  frame();

  // ── Grain ─────────────────────────────────────────────────
  let grainOn  = true;
  const grainEl = document.getElementById('grain-cv');
  const grainCx = grainEl.getContext('2d');
  let grainImg  = null;
  function drawGrainFrame() {
    if (!grainOn) return;
    const gW = Math.ceil(window.innerWidth  / 2);
    const gH = Math.ceil(window.innerHeight / 2);
    if (grainEl.width !== gW || grainEl.height !== gH) {
      grainEl.width  = gW;
      grainEl.height = gH;
      grainImg = grainCx.createImageData(gW, gH);
    }
    const data = grainImg.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = Math.random() * 30 | 0;
    }
    grainCx.putImageData(grainImg, 0, 0);
    requestAnimationFrame(drawGrainFrame);
  }
  function toggleGrain() {
    grainOn = !grainOn;
    if (grainOn) drawGrainFrame();
  }
  window.addEventListener('keydown', e => { if (e.key === 'g' || e.key === 'G') toggleGrain(); });
  canvas.addEventListener('click', () => { speedBump = Math.max(speedBump, 0.5); });
  document.getElementById('tkey').addEventListener('click', () => { speedBump = Math.max(speedBump, 0.5); });
  drawGrainFrame();

  // ── Mic toggle ────────────────────────────────────────────
  const btn = document.getElementById('btn');
  btn.addEventListener('click', async () => {
    if (micActive) {
      micActive = false;
      btn.style.opacity = '0.4';
      micStream?.getTracks().forEach(t => t.stop());
      audioCtx?.close();
      micStream = audioCtx = analyser = timeDomain = null;
      ampLevel = 0;
      return;
    }
    try {
      micStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      const src  = audioCtx.createMediaStreamSource(micStream);
      analyser   = audioCtx.createAnalyser();
      analyser.fftSize               = 2048;
      analyser.smoothingTimeConstant = 0.5;
      src.connect(analyser);
      timeDomain = new Uint8Array(analyser.fftSize);
      micActive  = true;
      btn.style.opacity = '';
    } catch { /* permission denied */ }
  });

  // ── C-key modifier ────────────────────────────────────────
  let cHeld = false;
  let uiColorIdx = 10;
  window.addEventListener('keyup',   e => { if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*'); if (e.key==='c'||e.key==='C') cHeld=false; });

  // ── VGA 16-color legend ───────────────────────────────────
  // Regular click → morph next blob toward that color
  // C + click    → change UI chrome color
  const POOL   = '.,:;+*#@0123456789';
  const PRIMES = ['2','3','5','7','11','13','17','19','/'];
  const rc = () => POOL[Math.floor(Math.random() * POOL.length)];
  const rb = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));
  const rp = () => PRIMES[Math.floor(Math.random() * PRIMES.length)];
  const VGA = [
    '#000000','#0000AA','#00AA00','#00AAAA',
    '#AA0000','#AA00AA','#AA5500','#AAAAAA',
    '#555555','#5555FF','#55FF55','#55FFFF',
    '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
  ];

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  const legendEl    = document.getElementById('legend');
  const legendSpans = VGA.map(col => {
    const s = document.createElement('span');
    s.style.color  = col;
    s.style.cursor = 'pointer';
    s.textContent  = rc();
    s.addEventListener('click', () => {
      if (cHeld) {
        btn.style.color  = col;
        opsEl.style.color = col;
        zkoEl.style.color = col;
        document.getElementById('ckey').style.color   = col;
        document.getElementById('tgkeys').style.color = col;
        document.getElementById('speed').style.color  = col;
      } else {
        const [r, g, b] = hexToRgb(col);
        const blob = BLOBS[morphIdx];
        blob.tr = r; blob.tg = g; blob.tb = b;
        morphIdx = (morphIdx + 1) % BLOBS.length;
      }
    });
    legendEl.appendChild(s);
    return s;
  });

  const zkoEl = document.getElementById('zko');
  zkoEl.textContent = rc()+rc()+rc()+rc();
  btn.textContent   = rb();
  const opsEl = document.getElementById('ops');
  opsEl.textContent = rp()+rp();

  let cycleMs = 140;
  function cycleFn() {
    btn.textContent   = rb();
    opsEl.textContent = rp()+rp();
    zkoEl.textContent = rc()+rc()+rc()+rc();
    legendSpans.forEach(s => s.textContent = rc());
  }
  let cycleId = setInterval(cycleFn, cycleMs);

  function updateSpeedUI() {
    const sl = document.getElementById('slower');
    const fa = document.getElementById('faster');
    sl.style.opacity       = cycleMs >= 560 ? '0.4' : '1';
    sl.style.pointerEvents = cycleMs >= 560 ? 'none' : '';
    fa.style.opacity       = cycleMs <= 140 ? '0.4' : '1';
    fa.style.pointerEvents = cycleMs <= 140 ? 'none' : '';
  }
  updateSpeedUI();

  document.getElementById('slower').addEventListener('click', () => {
    cycleMs = Math.min(560, cycleMs + 140);
    clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
  });
  document.getElementById('faster').addEventListener('click', () => {
    cycleMs = Math.max(140, cycleMs - 140);
    clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
  });

  window.addEventListener('keydown', e => {
    if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
    if (e.key === 'c' || e.key === 'C') { cHeld = true; return; }
    if (e.key === 't' || e.key === 'T') { speedBump = Math.max(speedBump, 0.5); return; }
    if      (e.key === 'ArrowLeft'  && !cHeld) {
      cycleMs = Math.min(560, cycleMs + 140);
      clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
    } else if (e.key === 'ArrowRight' && !cHeld) {
      cycleMs = Math.max(140, cycleMs - 140);
      clearInterval(cycleId); cycleId = setInterval(cycleFn, cycleMs); updateSpeedUI();
    } else if (cHeld && e.key === 'ArrowLeft') {
      // Slow blob drift
      driftRate = Math.max(0.002, driftRate - 0.002);
    } else if (cHeld && e.key === 'ArrowRight') {
      // Speed up blob drift
      driftRate = Math.min(0.030, driftRate + 0.002);
    } else if (!cHeld && e.key === 'ArrowUp') {
      colorIdx = (colorIdx - 1 + VGA.length) % VGA.length;
      const [r, g, b] = hexToRgb(VGA[colorIdx]);
      const blob = BLOBS[morphIdx]; blob.tr = r; blob.tg = g; blob.tb = b;
      morphIdx = (morphIdx + 1) % BLOBS.length;
    } else if (!cHeld && e.key === 'ArrowDown') {
      colorIdx = (colorIdx + 1) % VGA.length;
      const [r, g, b] = hexToRgb(VGA[colorIdx]);
      const blob = BLOBS[morphIdx]; blob.tr = r; blob.tg = g; blob.tb = b;
      morphIdx = (morphIdx + 1) % BLOBS.length;
    } else if (cHeld && e.key === 'ArrowUp') {
      uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
      btn.style.color   = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    } else if (cHeld && e.key === 'ArrowDown') {
      uiColorIdx = (uiColorIdx + 1) % VGA.length;
      btn.style.color   = VGA[uiColorIdx];
      opsEl.style.color = VGA[uiColorIdx];
      zkoEl.style.color = VGA[uiColorIdx];
      document.getElementById('ckey').style.color   = VGA[uiColorIdx];
      document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
      document.getElementById('speed').style.color  = VGA[uiColorIdx];
    }
  });

  // ── postMessage bridge (keyboard from parent window) ──────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'key') {
      if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
      window.dispatchEvent(new KeyboardEvent('keydown', {key:e.data.key, shiftKey:!!e.data.shiftKey, bubbles:true}));
    }
    else if (e.data?.type === 'keyup')
      window.dispatchEvent(new KeyboardEvent('keyup', {key:e.data.key, bubbles:true}));
    else if (e.data?.type === 'audioData')
      parentAudio = e.data;
  });

  // Randomize colors on load
  (function() {
    const GOOD = [6,11,13,14,15];
    colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
    const _uiPool = GOOD.filter(i => i !== colorIdx);
    uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
    const _uc = VGA[uiColorIdx];
    if (btn)   btn.style.color   = _uc;
    if (opsEl) opsEl.style.color = _uc;
    if (zkoEl) zkoEl.style.color = _uc;
    const _ck = document.getElementById('ckey');
    const _tk = document.getElementById('tgkeys');
    const _sp = document.getElementById('speed');
    if (_ck) _ck.style.color = _uc;
    if (_tk) _tk.style.color = _uc;
    if (_sp) _sp.style.color = _uc;
  })();
</script>
</body>
</html>
