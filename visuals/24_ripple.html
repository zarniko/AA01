<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    .scanline {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    }
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 4;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    #grain-cv { z-index: 2; opacity: 0.04; pointer-events: none; }
    #canvas   { z-index: 1; }

    #btn {
      all: unset;
      position: fixed; top: 20px; left: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14;

      cursor: pointer; user-select: none;
    }
    #tgkeys {
      position: fixed; top: 54px; left: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14;

      display: flex; gap: 1ch;
    }
    #tkey { cursor: pointer; }
    #legend {
      position: fixed; top: 20px; right: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      display: grid; grid-template-columns: repeat(8, 1em);
      gap: 4px 6px; line-height: 1.4; text-align: center;
    }
    #ckey {
      position: fixed; top: 68px; right: 24px; width: 1em; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14; text-align: center;
      pointer-events: none; user-select: none;
    }
    #ops {
      position: fixed; bottom: 20px; right: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14;

      pointer-events: none;
    }
    #speed {
      position: fixed; bottom: 40px; right: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14;

      user-select: none;
    }
    #speed span { cursor: pointer; }
    #zko {
      position: fixed; bottom: 20px; left: 24px; z-index: 6;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      letter-spacing: 3px; color: #39ff14;

      text-decoration: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="vignette"></div>
  <button id="btn"></button>
  <div id="tgkeys"><div id="tkey">T</div></div>
  <canvas id="grain-cv"></canvas>
  <div id="legend"></div>
  <div id="ops"></div>
  <div id="speed"><span id="slower">&lt;</span> <span id="faster">&gt;</span></div>
  <div id="ckey">C</div>
  <a id="zko" href="https://zko.io" target="_blank" rel="noopener"></a>
  <canvas id="canvas"></canvas>

  <script>
    // ── Canvas setup ───────────────────────────────────────────────
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const gCvs    = document.getElementById('grain-cv');
    const gCtx    = gCvs.getContext('2d');
    let W = 0, H = 0;

    // ── VGA / UI ───────────────────────────────────────────────────
    const VGA  = ['#000000','#0000AA','#00AA00','#00AAAA','#AA0000','#AA00AA','#AA5500','#AAAAAA',
                  '#555555','#5555FF','#55FF55','#55FFFF','#FF5555','#FF55FF','#FFFF55','#FFFFFF'];
    const POOL = '.,:;+*#@0123456789';
    const rc   = () => POOL[Math.floor(Math.random() * POOL.length)];
    const rb   = () => String.fromCodePoint(0x2801 + Math.floor(Math.random() * 255));

    let lineColor  = '#39ff14';
    let colorIdx   = 10;
    let uiColorIdx = 10;
    let cycleMs    = 280;
    let cHeld      = false;
    let ampLevel   = 0;
    let ampWasHigh = false;
    let micActive  = false, micStream = null, audioCtx = null, analyser = null, timeDomain = null;
    let parentAudio = null;

    const btn    = document.getElementById('btn');
    const opsEl  = document.getElementById('ops');
    const zkoEl  = document.getElementById('zko');
    const legEl  = document.getElementById('legend');

    // ── Simulation state ───────────────────────────────────────────
    let t          = 0;
    let extraAmp   = 0;
    let particles  = [];
    const N    = 2800;
    const STEP = 1.6;
    const FADE = 0.013;

    let fadeBoost = 1.0;

    // ── Scalar height field (topo's exact formula) ─────────────────
    // Particles follow contour lines (perpendicular to gradient).
    // We precompute a gradient grid each frame to avoid per-particle trig.
    const GX = 92, GY = 60;
    const _gx = new Float32Array(GX * GY);
    const _gy = new Float32Array(GX * GY);

    function buildGradGrid() {
      const AR    = W / H;
      const totalAmp = 1.0 + extraAmp;
      const hBuf  = new Float32Array((GX + 1) * (GY + 1));

      // Evaluate scalar field at grid points
      for (let j = 0; j <= GY; j++) {
        const uy = j / GY;
        const ty = uy * 2.6;
        for (let i = 0; i <= GX; i++) {
          const ux = i / GX;
          const tx = ux * 2.6 * AR;
          let h = (
            Math.sin(tx * 1.9 + t * 0.18 + 0.4) * Math.cos(ty * 1.6 - t * 0.14 + 1.0) * 0.38 +
            Math.sin(tx * 3.1 - t * 0.26 + 1.7) * Math.cos(ty * 2.8 + t * 0.21 - 0.5) * 0.26 +
            Math.sin(tx * 1.1 + t * 0.13 - 1.1) * Math.cos(ty * 3.5 - t * 0.22 + 0.6) * 0.20 +
            Math.sin(tx * 4.4 - t * 0.32 + 0.8) * Math.cos(ty * 1.4 + t * 0.28 - 1.2) * 0.11 +
            Math.sin(tx * 2.3 + t * 0.22 - 0.3) * Math.cos(ty * 4.2 - t * 0.17 + 2.0) * 0.07
          ) * totalAmp;

          hBuf[j * (GX + 1) + i] = h;
        }
      }

      // Finite-difference gradient at each cell
      const dx = W / GX, dy = H / GY;
      for (let j = 0; j < GY; j++) {
        for (let i = 0; i < GX; i++) {
          _gx[j * GX + i] = (hBuf[j * (GX + 1) + (i + 1)] - hBuf[j * (GX + 1) + i]) / dx;
          _gy[j * GX + i] = (hBuf[(j + 1) * (GX + 1) + i] - hBuf[j * (GX + 1) + i]) / dy;
        }
      }
    }

    // Generic bilinear interpolation on a GX×GY grid
    function bilinear(arr, x, y) {
      const fi = Math.max(0, Math.min(GX - 1, x / W * GX));
      const fj = Math.max(0, Math.min(GY - 1, y / H * GY));
      const i0 = fi | 0, i1 = Math.min(i0 + 1, GX - 1);
      const j0 = fj | 0, j1 = Math.min(j0 + 1, GY - 1);
      const sx = fi - i0, sy = fj - j0;
      return arr[j0*GX+i0]*(1-sx)*(1-sy) + arr[j0*GX+i1]*sx*(1-sy)
           + arr[j1*GX+i0]*(1-sx)*sy     + arr[j1*GX+i1]*sx*sy;
    }

    function lookupAngle(x, y) {
      return Math.atan2(bilinear(_gx, x, y), -bilinear(_gy, x, y));
    }

    // ── Color palette (maps initial y0/H → RGB) ────────────────────
    const PAL = [
      [0.00, [255, 188, 212]],   // pale pink
      [0.13, [ 62,   8, 102]],   // deep purple
      [0.29, [208,  28,  38]],   // vivid red
      [0.46, [222, 216, 226]],   // near-white / silver
      [0.59, [ 46,  46,  56]],   // dark charcoal
      [0.71, [ 30, 110,  84]],   // teal
      [0.84, [186,  20,  30]],   // red reprise
      [1.00, [255, 105, 170]],   // bright pink
    ];

    // Default palette hue anchor = hue of #39ff14 ≈ 107°
    let hueShift = 0;

    function hexHue(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      if (d < 0.02) return -1; // achromatic
      let h;
      if (max === r)      h = ((g - b) / d) % 6;
      else if (max === g) h = (b - r) / d + 2;
      else                h = (r - g) / d + 4;
      return ((h * 60) % 360 + 360) % 360;
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      const l = (max + min) / 2;
      if (d < 0.001) return [0, 0, l * 100];
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      let h;
      if (max === r)      h = ((g - b) / d + (g < b ? 6 : 0));
      else if (max === g) h = (b - r) / d + 2;
      else                h = (r - g) / d + 4;
      return [h * 60, s * 100, l * 100];
    }

    function hslToRgb255(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => ((l - a * Math.max(Math.min((n + h / 30) % 12 - 3, 9 - (n + h / 30) % 12, 1), -1)) * 255) | 0;
      return [f(0), f(8), f(4)];
    }

    function palRGB(y0) {
      const f = Math.max(0, Math.min(1, y0 / H));
      let i = 0;
      while (i < PAL.length - 2 && PAL[i + 1][0] <= f) i++;
      const [t0, c0] = PAL[i], [t1, c1] = PAL[i + 1];
      const k = (f - t0) / (t1 - t0);
      const r = (c0[0] + (c1[0] - c0[0]) * k) | 0;
      const g = (c0[1] + (c1[1] - c0[1]) * k) | 0;
      const b = (c0[2] + (c1[2] - c0[2]) * k) | 0;
      if (hueShift === 0) return [r, g, b];
      const [h, s, l] = rgbToHsl(r, g, b);
      return hslToRgb255((h + hueShift + 360) % 360, s, l);
    }

    // ── Particles ──────────────────────────────────────────────────
    function mkParticle() {
      const y = Math.random() * H;
      return {
        x: Math.random() * W, y, y0: y, age: 0,
        maxAge: (130 + Math.random() * 170) | 0,
        speed:  1.1 + Math.random() * 0.9,
      };
    }

    function initParticles() {
      // Stagger ages so the canvas fills immediately
      particles = Array.from({ length: N }, () => {
        const p = mkParticle();
        p.age = (Math.random() * p.maxAge * 0.7) | 0;
        return p;
      });
    }

    // ── Tick ───────────────────────────────────────────────────────
    function tick(draw) {
      t += 0.0035 * (140 / cycleMs);
      fadeBoost = Math.max(1.0, fadeBoost * 0.965);
      if (draw) {
        ctx.fillStyle = `rgba(0,0,0,${FADE * fadeBoost})`;
        ctx.fillRect(0, 0, W, H);
      }
      const sm = 1 + ampLevel * 2.8;
      for (const p of particles) {
        const a  = lookupAngle(p.x, p.y);
        const sp = p.speed * sm * STEP;
        const nx = p.x + Math.cos(a) * sp;
        const ny = p.y + Math.sin(a) * sp;
        if (draw) {
          const lf = Math.min(1, p.age / 28) * Math.min(1, (p.maxAge - p.age) / 28);
          if (lf > 0.02) {
            const [r, g, b] = palRGB(p.y0);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${r},${g},${b},${(lf * 0.75).toFixed(3)})`;
            ctx.lineWidth   = 0.8 + lf * 0.45;
            ctx.moveTo(p.x, p.y); ctx.lineTo(nx, ny);
            ctx.stroke();
          }
        }
        p.x = nx; p.y = ny; p.age++;
        if (p.x < -12 || p.x > W + 12 || p.y < -12 || p.y > H + 12 || p.age >= p.maxAge) {
          Object.assign(p, mkParticle());
        }
      }
    }

    // ── Trigger ────────────────────────────────────────────────────
    function triggerRipple() {
      fadeBoost = 6.0;
      t += 0.5 + Math.random() * 1.5;
    }

    // ── Grain ──────────────────────────────────────────────────────
    function drawGrainFrame() {
      const id = gCtx.createImageData(W, H);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = (Math.random() * 255) | 0;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 25;
      }
      gCtx.putImageData(id, 0, 0);
    }

    // ── Resize / init ──────────────────────────────────────────────
    function resize() {
      W = canvas.width = gCvs.width = canvas.offsetWidth;
      H = canvas.height = gCvs.height = canvas.offsetHeight;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      initParticles();
      // Warm-up: advance positions onto flow lines, then pre-render trails
      buildGradGrid();
      for (let i = 0; i < 80; i++) tick(false);
      for (let i = 0; i < 60; i++) { buildGradGrid(); tick(true); }
    }
    window.addEventListener('resize', resize);

    // ── Main loop ──────────────────────────────────────────────────
    function frame() {
      if (micActive || parentAudio) {
        let rms;
        if (micActive && analyser) {
          analyser.getByteTimeDomainData(timeDomain);
          let sq = 0;
          for (let i = 0; i < timeDomain.length; i++) {
            const d = timeDomain[i] / 255 - 0.5; sq += d * d;
          }
          rms = Math.sqrt(sq / timeDomain.length);
        } else { rms = parentAudio.rms; }
        extraAmp += (ampLevel * 0.45 - extraAmp) * 0.08;
        ampLevel += (rms * 5 - ampLevel) * 0.12;
        if (rms > 0.05 && !ampWasHigh) { triggerRipple(); ampWasHigh = true; }
        else if (rms < 0.03) ampWasHigh = false;
      } else {
        ampLevel *= 0.93;
        extraAmp *= 0.95;
      }
      buildGradGrid();
      tick(true);
      drawGrainFrame();
      requestAnimationFrame(frame);
    }

    // ── Legend swatches ────────────────────────────────────────────
    const legendSpans = VGA.map(col => {
      const s = document.createElement('span');
      s.style.color  = col;
      s.style.cursor = 'pointer';
      s.textContent  = rc();
      s.addEventListener('click', () => {
        if (cHeld) {
          btn.style.color  = col; opsEl.style.color = col; zkoEl.style.color = col;
          document.getElementById('ckey').style.color   = col;
          document.getElementById('tgkeys').style.color = col;
          document.getElementById('speed').style.color  = col;
        } else {
          lineColor = col; colorIdx = VGA.indexOf(col);
          const h = hexHue(col);
          hueShift = h >= 0 ? (h - 107 + 360) % 360 : 0;
        }
      });
      legEl.appendChild(s);
      return s;
    });

    setInterval(() => {
      legendSpans.forEach(s => s.textContent = rc());
      opsEl.textContent = rc() + rc() + rc() + rc() + rc();
      zkoEl.textContent = rc() + rc() + rc();
      btn.textContent = rb();
    }, 140);

    // ── Mic toggle ─────────────────────────────────────────────────
    btn.textContent = rb();
    btn.addEventListener('click', async () => {
      if (micActive) {
        micStream?.getTracks().forEach(t => t.stop());
        audioCtx?.close();
        micStream = audioCtx = analyser = timeDomain = null;
        micActive = false; ampLevel = 0;
        btn.textContent = rb();
        return;
      }
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaStreamSource(micStream);
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.6;
        src.connect(analyser);
        timeDomain = new Uint8Array(analyser.fftSize);
        micActive  = true;
      } catch {}
    });

    // ── Key handling ───────────────────────────────────────────────
    window.addEventListener('keydown', e => {
      if (e.isTrusted) window.parent?.postMessage({ type: 'childKey', key: e.key, shiftKey: !!e.shiftKey }, '*');
      if (e.key === 'c' || e.key === 'C') { cHeld = true; return; }
      if (e.key === 't' || e.key === 'T') { triggerRipple(); return; }
      if (e.key === 'ArrowLeft' || e.key === '<') {
        cycleMs = Math.min(560, cycleMs + 140);
      } else if (e.key === 'ArrowRight' || e.key === '>') {
        cycleMs = Math.max(140, cycleMs - 140);
      } else if (!cHeld && e.key === 'ArrowUp') {
        colorIdx = (colorIdx - 1 + VGA.length) % VGA.length; lineColor = VGA[colorIdx]; const h = hexHue(lineColor); hueShift = h >= 0 ? (h - 107 + 360) % 360 : 0;
      } else if (!cHeld && e.key === 'ArrowDown') {
        colorIdx = (colorIdx + 1) % VGA.length; lineColor = VGA[colorIdx]; const h = hexHue(lineColor); hueShift = h >= 0 ? (h - 107 + 360) % 360 : 0;
      } else if (cHeld && e.key === 'ArrowUp') {
        uiColorIdx = (uiColorIdx - 1 + VGA.length) % VGA.length;
        btn.style.color  = VGA[uiColorIdx]; opsEl.style.color = VGA[uiColorIdx]; zkoEl.style.color = VGA[uiColorIdx];
        document.getElementById('ckey').style.color   = VGA[uiColorIdx];
        document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
        document.getElementById('speed').style.color  = VGA[uiColorIdx];
      } else if (cHeld && e.key === 'ArrowDown') {
        uiColorIdx = (uiColorIdx + 1) % VGA.length;
        btn.style.color  = VGA[uiColorIdx]; opsEl.style.color = VGA[uiColorIdx]; zkoEl.style.color = VGA[uiColorIdx];
        document.getElementById('ckey').style.color   = VGA[uiColorIdx];
        document.getElementById('tgkeys').style.color = VGA[uiColorIdx];
        document.getElementById('speed').style.color  = VGA[uiColorIdx];
      }
    });

    window.addEventListener('keyup', e => {
      if (e.isTrusted) window.parent?.postMessage({ type: 'childKeyup', key: e.key }, '*');
      if (e.key === 'c' || e.key === 'C') cHeld = false;
    });

    window.addEventListener('message', e => {
      if (e.data?.type === 'key') {
        if (e.data.cHeld !== undefined) cHeld = !!e.data.cHeld;
        window.dispatchEvent(new KeyboardEvent('keydown', { key: e.data.key, shiftKey: !!e.data.shiftKey, bubbles: true }));
      }
      else if (e.data?.type === 'keyup')
        window.dispatchEvent(new KeyboardEvent('keyup',   { key: e.data.key, bubbles: true }));
      else if (e.data?.type === 'audioData')
        parentAudio = e.data;
    });

    canvas.addEventListener('click', triggerRipple);
    document.getElementById('tkey').addEventListener('click', triggerRipple);
    document.getElementById('slower').addEventListener('click', () => cycleMs = Math.min(560, cycleMs + 140));
    document.getElementById('faster').addEventListener('click', () => cycleMs = Math.max(140, cycleMs - 140));

    // Randomize colors on load
    (function() {
      const GOOD = [6,11,13,14,15];
      colorIdx  = GOOD[Math.floor(Math.random() * GOOD.length)];
      lineColor = VGA[colorIdx];
      const _h = hexHue ? hexHue(VGA[colorIdx]) : -1;
      if (typeof hueShift !== 'undefined' && _h >= 0) hueShift = (_h - 107 + 360) % 360;
      const _uiPool = GOOD.filter(i => i !== colorIdx);
      uiColorIdx = _uiPool[Math.floor(Math.random() * _uiPool.length)];
      const _uc = VGA[uiColorIdx];
      if (btn)   btn.style.color   = _uc;
      if (opsEl) opsEl.style.color = _uc;
      if (zkoEl) zkoEl.style.color = _uc;
      const _ck = document.getElementById('ckey');
      const _tk = document.getElementById('tgkeys');
      const _sp = document.getElementById('speed');
      if (_ck) _ck.style.color = _uc;
      if (_tk) _tk.style.color = _uc;
      if (_sp) _sp.style.color = _uc;
    })();

    resize();
    frame();
  </script>
</body>
</html>
